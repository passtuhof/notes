<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
  <title>Заметки</title>
  <style>
    :root{
      --bg:#0f1720; --panel:#17212b; --panel2:#1f2c38; --panel3:#233343;
      --text:#e9f1f7; --muted:#8fa3b5; --blue:#2ea6ff; --green:#49c16d;
      --danger:#ff5c5c; --line:rgba(255,255,255,.08); --bubble:#213040; --my:#2b5278;
      --safe-top: env(safe-area-inset-top); --safe-bottom: env(safe-area-inset-bottom);
    }
    *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;user-select:none;-webkit-user-select:none}
    input,textarea{user-select:text;-webkit-user-select:text}
    html,body{margin:0;height:100%;overflow:hidden;background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;overscroll-behavior:none;touch-action:manipulation}
    button,input,textarea{font:inherit}
    button{border:0;background:none;color:inherit;cursor:pointer}
    .app{height:100dvh;display:grid;grid-template-columns:360px 1fr;background:var(--bg);padding-top:var(--safe-top);padding-bottom:var(--safe-bottom)}
    .sidebar{background:var(--panel);border-right:1px solid var(--line);display:flex;flex-direction:column;min-width:0}
    .main{display:flex;flex-direction:column;min-width:0;background:linear-gradient(180deg,#0e1822,#101c26)}
    .top{height:58px;display:flex;align-items:center;gap:10px;padding:8px 12px;border-bottom:1px solid var(--line);background:var(--panel2);flex:0 0 auto}
    .title{font-weight:800;font-size:18px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.sub{font-size:12px;color:var(--muted)}
    .iconBtn{width:40px;height:40px;border-radius:999px;display:grid;place-items:center;font-size:22px;flex:0 0 auto}.iconBtn:active,.iconBtn:hover{background:rgba(255,255,255,.08)}
    .search{padding:8px 10px;border-bottom:1px solid var(--line)}
    .search input,.modal input,.modal textarea{width:100%;border:0;outline:0;background:rgba(255,255,255,.08);color:var(--text);border-radius:12px;padding:12px}.search input::placeholder,.modal input::placeholder,.modal textarea::placeholder{color:var(--muted)}
    .list{overflow:auto;-webkit-overflow-scrolling:touch;flex:1}.item{display:flex;gap:12px;padding:12px;border-bottom:1px solid rgba(255,255,255,.04);align-items:center;min-height:68px}.item:active,.item.active{background:rgba(46,166,255,.15)}
    .avatar{width:46px;height:46px;border-radius:50%;display:grid;place-items:center;background:linear-gradient(135deg,#2ea6ff,#835cff);font-weight:900;font-size:20px;flex:0 0 auto}.avatar.topic{border-radius:15px;background:linear-gradient(135deg,#49c16d,#2ea6ff)}
    .itemBody{min-width:0;flex:1}.row{display:flex;align-items:center;justify-content:space-between;gap:10px}.name{font-weight:700;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}.preview{color:var(--muted);font-size:13px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;margin-top:4px}.time{font-size:12px;color:var(--muted);white-space:nowrap}.badge{background:var(--blue);color:white;border-radius:999px;padding:2px 7px;font-size:12px}
    .empty{height:100%;display:grid;place-items:center;text-align:center;color:var(--muted);padding:30px}.empty h2{color:var(--text);margin:0 0 8px}.chat{flex:1;overflow:auto;padding:14px;display:flex;flex-direction:column;gap:8px;-webkit-overflow-scrolling:touch;background-image:radial-gradient(rgba(255,255,255,.035) 1px, transparent 1px);background-size:18px 18px}
    .dateSep{align-self:center;background:rgba(0,0,0,.25);color:#c7d5df;border-radius:999px;padding:5px 10px;font-size:12px;margin:8px 0}.msg{align-self:flex-end;max-width:min(720px,85%);background:var(--my);border-radius:16px 16px 4px 16px;padding:9px 10px;position:relative;box-shadow:0 2px 10px rgba(0,0,0,.12);white-space:pre-wrap;word-wrap:break-word}.msg.pinned{outline:2px solid rgba(73,193,109,.5)}.msg .meta{display:flex;gap:8px;align-items:center;justify-content:flex-end;margin-top:4px;color:#c7d5df;font-size:11px}.pin{color:#7ef0a0}.att{margin-top:8px;border-radius:12px;overflow:hidden;background:rgba(0,0,0,.18)}.att img,.att video{display:block;max-width:100%;max-height:360px}.att audio{width:260px;display:block}.fileLink{display:flex;gap:9px;align-items:center;padding:10px;color:#fff;text-decoration:none}
    .composer{border-top:1px solid var(--line);background:var(--panel2);padding:8px;display:flex;gap:8px;align-items:flex-end}.composer textarea{flex:1;min-height:42px;max-height:130px;resize:none;border:0;outline:0;border-radius:18px;background:rgba(255,255,255,.08);color:var(--text);padding:11px 14px}.send{background:var(--blue);width:42px;height:42px;border-radius:999px;display:grid;place-items:center;font-size:20px;flex:0 0 auto}.attach{width:42px;height:42px;border-radius:999px;background:rgba(255,255,255,.08);font-size:22px;flex:0 0 auto}.tabs{display:flex;gap:8px;padding:8px 10px;border-bottom:1px solid var(--line);background:var(--panel)}.tab{flex:1;padding:9px;border-radius:12px;color:var(--muted);font-weight:700}.tab.active{background:rgba(46,166,255,.18);color:var(--text)}
    .modalShade{position:fixed;inset:0;background:rgba(0,0,0,.55);display:none;align-items:flex-end;z-index:20}.modalShade.show{display:flex}.modal{width:100%;max-width:520px;margin:auto;background:var(--panel2);border-radius:18px;padding:16px;box-shadow:0 20px 60px rgba(0,0,0,.45)}.modal h3{margin:0 0 12px}.modal textarea{min-height:110px;resize:vertical}.modalActions{display:flex;gap:8px;margin-top:12px}.btn{padding:12px 14px;border-radius:12px;background:rgba(255,255,255,.09);font-weight:800;flex:1}.btn.primary{background:var(--blue)}.btn.danger{background:rgba(255,92,92,.18);color:#ffb0b0}.ctx{position:fixed;z-index:30;display:none;min-width:230px;background:#243342;border:1px solid var(--line);border-radius:14px;overflow:hidden;box-shadow:0 15px 45px rgba(0,0,0,.45)}.ctx button{display:block;width:100%;padding:14px 16px;text-align:left;border-bottom:1px solid var(--line)}.ctx button:last-child{border-bottom:0}.ctx .danger{color:#ff9a9a}
    .back{display:none}.pinnedBar{display:none;background:rgba(73,193,109,.14);border-bottom:1px solid rgba(73,193,109,.25);padding:9px 14px;color:#caffd8;font-size:13px}.pinnedBar.show{display:block}
    @media(max-width:760px){.app{display:block}.sidebar,.main{position:absolute;inset:var(--safe-top) 0 var(--safe-bottom) 0}.main{transform:translateX(100%);transition:.22s ease}.app.openChat .main{transform:translateX(0)}.app.openChat .sidebar{pointer-events:none}.back{display:grid}.modal{margin:0 8px 8px;max-width:none}.msg{max-width:88%}}
  </style>
</head>
<body>
<div class="app" id="app">
  <aside class="sidebar">
    <div class="top"><div style="flex:1;min-width:0"><div class="title">Заметки</div><div class="sub">Группы, подтемы, сообщения</div></div><button class="iconBtn" id="addGroup">＋</button></div>
    <div class="search"><input id="search" placeholder="Поиск по заметкам" autocomplete="off"></div>
    <div class="tabs"><button class="tab active" id="groupsTab">Группы</button><button class="tab" id="favTab">Закрепы</button></div>
    <div class="list" id="groupList"></div>
  </aside>
  <main class="main">
    <div class="top" id="chatTop"><button class="iconBtn back" id="back">‹</button><div class="avatar topic" id="chatAvatar">∴</div><div style="flex:1;min-width:0"><div class="title" id="chatTitle">Выбери группу</div><div class="sub" id="chatSub">или создай новую</div></div><button class="iconBtn" id="editCurrent">⋯</button></div>
    <div class="pinnedBar" id="pinnedBar"></div>
    <div class="chat" id="chat"><div class="empty"><div><h2>Личный заметочник</h2><div>Создай группу, потом подтему и пиши заметки как сообщения.</div></div></div></div>
    <div class="composer" id="composer" style="display:none"><button class="attach" id="attachBtn">＋</button><textarea id="msgInput" placeholder="Сообщение"></textarea><button class="send" id="sendBtn">➤</button><input id="fileInput" type="file" multiple hidden accept="image/*,video/*,audio/*,.pdf,.doc,.docx,.xls,.xlsx,.txt,.zip"></div>
  </main>
</div>
<div class="modalShade" id="modalShade"><div class="modal"><h3 id="modalTitle"></h3><input id="modalInput" placeholder="Название"><textarea id="modalText" placeholder="Текст" style="display:none;margin-top:10px"></textarea><div class="modalActions" id="modalActions"></div></div></div>
<div class="ctx" id="ctx"></div>
<script>
(()=>{
  const $=s=>document.querySelector(s); const uid=()=>Date.now().toString(36)+Math.random().toString(36).slice(2,7);
  const LS='tg_notes_v1'; let db=load(); let view={mode:'groups',group:null,topic:null,search:'',editingMsg:null};
  function load(){try{return JSON.parse(localStorage.getItem(LS))||seed()}catch{return seed()}}
  function save(){localStorage.setItem(LS,JSON.stringify(db))}
  function seed(){return {groups:[{id:uid(),name:'🎤 Мероприятия',topics:[{id:uid(),name:'Выпускные',messages:[{id:uid(),text:'Идеи для выпускного, конкурсы, музыка, факты по гостям.',ts:Date.now(),pinned:true,files:[]}]},{id:uid(),name:'Свадьбы',messages:[]}]},{id:uid(),name:'🎮 Игры',topics:[{id:uid(),name:'Нейро крокодил',messages:[]},{id:uid(),name:'Мафия',messages:[]}]},{id:uid(),name:'📱 Контент',topics:[{id:uid(),name:'VK / Shorts',messages:[]}]}]}}
  const curG=()=>db.groups.find(g=>g.id===view.group); const curT=()=>curG()?.topics.find(t=>t.id===view.topic);
  function esc(s=''){return s.replace(/[&<>"]/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[m]))}
  function time(ts){let d=new Date(ts), n=new Date(); if(d.toDateString()===n.toDateString())return d.toLocaleTimeString('ru-RU',{hour:'2-digit',minute:'2-digit'}); return d.toLocaleDateString('ru-RU',{day:'2-digit',month:'2-digit'})}
  function lastMsg(g){let all=g.topics.flatMap(t=>t.messages.map(m=>({...m,t:t.name}))).sort((a,b)=>b.ts-a.ts); return all[0]}
  function render(){renderList();renderChat()}
  function renderList(){let el=$('#groupList'), q=view.search.toLowerCase().trim(); el.innerHTML='';
    if(view.mode==='pins'){let pins=[]; db.groups.forEach(g=>g.topics.forEach(t=>t.messages.filter(m=>m.pinned).forEach(m=>pins.push({g,t,m})))); pins.sort((a,b)=>b.m.ts-a.m.ts); if(!pins.length) return el.innerHTML='<div class="empty">Закрепленных сообщений пока нет</div>'; pins.forEach(x=>addItem(el,'📌',x.t.name,x.m.text||filePreview(x.m),time(x.m.ts),()=>{openTopic(x.g.id,x.t.id); setTimeout(()=>document.querySelector(`[data-mid="${x.m.id}"]`)?.scrollIntoView({block:'center'}),50)})); return}
    let groups=db.groups.filter(g=>!q||g.name.toLowerCase().includes(q)||g.topics.some(t=>t.name.toLowerCase().includes(q)||t.messages.some(m=>m.text.toLowerCase().includes(q))));
    if(!groups.length) return el.innerHTML='<div class="empty">Ничего не найдено</div>';
    groups.forEach(g=>{let lm=lastMsg(g); addItem(el,g.name.replace(/[\p{Letter}\p{Number}\s]/gu,'').slice(0,2)||g.name[0],g.name,lm?(lm.text||filePreview(lm)):'Нет сообщений',lm?time(lm.ts):'',()=>openGroup(g.id),()=>groupMenu(g))})
  }
  function addItem(parent,av,name,prev,t,click,long){let d=document.createElement('div');d.className='item';d.innerHTML=`<div class="avatar">${esc(av)}</div><div class="itemBody"><div class="row"><div class="name">${esc(name)}</div><div class="time">${esc(t)}</div></div><div class="preview">${esc(prev)}</div></div>`; d.onclick=click; d.oncontextmenu=e=>{e.preventDefault();long&&long(e)}; let timer; d.ontouchstart=e=>{timer=setTimeout(()=>long&&long(e.touches[0]),550)}; d.ontouchend=()=>clearTimeout(timer); parent.appendChild(d)}
  function openGroup(id){view.group=id;view.topic=null;$('#app').classList.add('openChat');renderChat()}
  function openTopic(gid,tid){view.group=gid;view.topic=tid;$('#app').classList.add('openChat');renderChat();setTimeout(()=>{$('#chat').scrollTop=$('#chat').scrollHeight},0)}
  function renderChat(){let chat=$('#chat'), g=curG(), t=curT(); $('#composer').style.display=t?'flex':'none'; $('#pinnedBar').classList.remove('show');
    if(!g){$('#chatTitle').textContent='Выбери группу';$('#chatSub').textContent='или создай новую';chat.innerHTML='<div class="empty"><div><h2>Личный заметочник</h2><div>Создай группу, потом подтему и пиши заметки как сообщения.</div></div></div>';return}
    if(!t){$('#chatTitle').textContent=g.name;$('#chatSub').textContent='Подтемы'; chat.innerHTML=''; if(!g.topics.length) chat.innerHTML='<div class="empty">Подтем пока нет</div>'; g.topics.forEach(tp=>{let div=document.createElement('div');div.className='item';div.innerHTML=`<div class="avatar topic">#</div><div class="itemBody"><div class="row"><div class="name">${esc(tp.name)}</div><div class="badge">${tp.messages.length}</div></div><div class="preview">${esc((tp.messages.at(-1)?.text)||'Открыть подтему')}</div></div>`;div.onclick=()=>openTopic(g.id,tp.id);div.oncontextmenu=e=>{e.preventDefault();topicMenu(tp,e)};chat.appendChild(div)}); let add=document.createElement('button');add.className='btn primary';add.style.margin='12px';add.textContent='＋ Добавить подтему';add.onclick=()=>modal('Новая подтема','Название подтемы','',v=>{g.topics.push({id:uid(),name:v,messages:[]});save();render()});chat.appendChild(add);return}
    $('#chatTitle').textContent=t.name;$('#chatSub').textContent=g.name; let pins=t.messages.filter(m=>m.pinned); if(pins.length){$('#pinnedBar').textContent='📌 Закреплено: '+(pins[0].text||filePreview(pins[0]));$('#pinnedBar').classList.add('show')}
    chat.innerHTML=''; if(!t.messages.length) chat.innerHTML='<div class="empty">Напиши первую заметку</div>'; let lastDate='';
    t.messages.forEach(m=>{let ds=new Date(m.ts).toLocaleDateString('ru-RU'); if(ds!==lastDate){lastDate=ds;let sep=document.createElement('div');sep.className='dateSep';sep.textContent=ds;chat.appendChild(sep)} let msg=document.createElement('div');msg.className='msg'+(m.pinned?' pinned':'');msg.dataset.mid=m.id;msg.innerHTML=`${m.text?esc(m.text):''}${filesHtml(m)}<div class="meta">${m.pinned?'<span class="pin">📌</span>':''}<span>${time(m.ts)}</span></div>`;msg.oncontextmenu=e=>{e.preventDefault();msgMenu(m,e)}; let timer; msg.ontouchstart=e=>{timer=setTimeout(()=>msgMenu(m,e.touches[0]),500)}; msg.ontouchend=()=>clearTimeout(timer); chat.appendChild(msg)});
  }
  function filePreview(m){return m.files?.length?'📎 '+m.files.map(f=>f.name).join(', '):''}
  function filesHtml(m){return (m.files||[]).map(f=>{if(f.type.startsWith('image/'))return `<div class="att"><img src="${f.data}" alt=""></div>`;if(f.type.startsWith('video/'))return `<div class="att"><video src="${f.data}" controls playsinline></video></div>`;if(f.type.startsWith('audio/'))return `<div class="att"><audio src="${f.data}" controls></audio></div>`;return `<div class="att"><a class="fileLink" href="${f.data}" download="${esc(f.name)}">📎 <span>${esc(f.name)}</span></a></div>`}).join('')}
  function modal(title,ph,val,ok,showText=false,textVal=''){let sh=$('#modalShade');$('#modalTitle').textContent=title;$('#modalInput').placeholder=ph;$('#modalInput').value=val||'';$('#modalText').style.display=showText?'block':'none';$('#modalText').value=textVal||'';$('#modalActions').innerHTML='<button class="btn" id="cancel">Отмена</button><button class="btn primary" id="ok">Сохранить</button>'; sh.classList.add('show');$('#modalInput').focus();$('#cancel').onclick=()=>sh.classList.remove('show');$('#ok').onclick=()=>{let v=$('#modalInput').value.trim(); if(!v&& !showText)return; ok(v,$('#modalText').value); sh.classList.remove('show')}}
  function menu(items,x,y){let c=$('#ctx');c.innerHTML=items.map(i=>`<button class="${i.danger?'danger':''}" data-k="${i.k}">${i.t}</button>`).join('');c.style.display='block';c.style.left=Math.min(x,innerWidth-250)+'px';c.style.top=Math.min(y,innerHeight-220)+'px';c.querySelectorAll('button').forEach(b=>b.onclick=()=>{let it=items.find(i=>i.k===b.dataset.k);c.style.display='none';it.fn()})}
  function groupMenu(g,e){menu([{k:'ren',t:'Редактировать',fn:()=>modal('Редактировать группу','Название',g.name,v=>{g.name=v;save();render()})},{k:'del',t:'Удалить группу',danger:true,fn:()=>{if(confirm('Удалить группу?')){db.groups=db.groups.filter(x=>x.id!==g.id);view.group=null;view.topic=null;save();render()}}}],e.clientX,e.clientY)}
  function topicMenu(t,e){let g=curG();menu([{k:'ren',t:'Редактировать',fn:()=>modal('Редактировать подтему','Название',t.name,v=>{t.name=v;save();render()})},{k:'del',t:'Удалить подтему',danger:true,fn:()=>{if(confirm('Удалить подтему?')){g.topics=g.topics.filter(x=>x.id!==t.id);view.topic=null;save();render()}}}],e.clientX,e.clientY)}
  function msgMenu(m,e){menu([{k:'edit',t:'Редактировать',fn:()=>{view.editingMsg=m.id;$('#msgInput').value=m.text;$('#msgInput').focus()}},{k:'pin',t:m.pinned?'Открепить':'Закрепить',fn:()=>{m.pinned=!m.pinned;save();render()}},{k:'del',t:'Удалить',danger:true,fn:()=>{let t=curT();t.messages=t.messages.filter(x=>x.id!==m.id);save();render()}}],e.clientX,e.clientY)}
  function send(files=[]){let t=curT(), txt=$('#msgInput').value.trim(); if(!t||(!txt&&!files.length))return; if(view.editingMsg){let m=t.messages.find(x=>x.id===view.editingMsg); if(m){m.text=txt;m.ts=Date.now()} view.editingMsg=null}else t.messages.push({id:uid(),text:txt,ts:Date.now(),pinned:false,files}); $('#msgInput').value='';save();render();setTimeout(()=>{$('#chat').scrollTop=$('#chat').scrollHeight},0)}
  $('#addGroup').onclick=()=>modal('Новая группа','Название группы','',v=>{db.groups.unshift({id:uid(),name:v,topics:[]});save();render()});
  $('#editCurrent').onclick=e=>{let t=curT(),g=curG(); if(t)topicMenu(t,e); else if(g)groupMenu(g,e)}; $('#back').onclick=()=>{$('#app').classList.remove('openChat')};
  $('#groupsTab').onclick=()=>{view.mode='groups';$('#groupsTab').classList.add('active');$('#favTab').classList.remove('active');renderList()}; $('#favTab').onclick=()=>{view.mode='pins';$('#favTab').classList.add('active');$('#groupsTab').classList.remove('active');renderList()};
  $('#search').oninput=e=>{view.search=e.target.value;renderList()}; $('#sendBtn').onclick=()=>send(); $('#msgInput').addEventListener('keydown',e=>{if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();send()}}); $('#attachBtn').onclick=()=>$('#fileInput').click();
  $('#fileInput').onchange=async e=>{let arr=[]; for(const f of e.target.files){arr.push({name:f.name,type:f.type||'application/octet-stream',data:await new Promise(r=>{let fr=new FileReader();fr.onload=()=>r(fr.result);fr.readAsDataURL(f)})})} e.target.value=''; send(arr)};
  document.addEventListener('click',e=>{if(!e.target.closest('#ctx'))$('#ctx').style.display='none'; if(e.target===$('#modalShade'))$('#modalShade').classList.remove('show')});
  render();
})();
</script>
</body>
</html>
