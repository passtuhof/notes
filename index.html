<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta
name="viewport"
content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">

<title>Telegram Notes</title>

<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">

<style>

/* ===== CSS БУДЕТ В ЧАСТИ 2 ===== */

*{
margin:0;
padding:0;
box-sizing:border-box;
-webkit-tap-highlight-color:transparent;
}

html,
body{
width:100%;
height:100%;
overflow:hidden;
font-family:-apple-system,BlinkMacSystemFont,"SF Pro Text","Helvetica Neue",sans-serif;
background:#ffffff;
user-select:none;
-webkit-user-select:none;
}

body{
position:fixed;
inset:0;
}

#app{
display:flex;
width:100%;
height:100%;
}

/* ===== SIDEBAR ===== */

#sidebar{
width:360px;
min-width:360px;
background:#ffffff;
border-right:1px solid #e6e6e6;
display:flex;
flex-direction:column;
overflow:hidden;
}

.sidebarTop{
height:60px;
display:flex;
align-items:center;
justify-content:space-between;
padding:0 16px;
border-bottom:1px solid #ececec;
background:#fff;
}

.telegramLogo{
font-size:20px;
font-weight:700;
color:#111;
}

#newChatBtn{
width:36px;
height:36px;
border:none;
border-radius:50%;
background:#2aabee;
color:#fff;
font-size:24px;
cursor:pointer;
}

.searchBlock{
padding:10px;
border-bottom:1px solid #ececec;
background:#fff;
}

#searchInput{
width:100%;
height:38px;
border:none;
outline:none;
background:#f1f1f1;
border-radius:10px;
padding:0 14px;
font-size:15px;
}

#chatList{
flex:1;
overflow-y:auto;
background:#fff;
}

.chatItem{
height:72px;
display:flex;
align-items:center;
padding:0 12px;
cursor:pointer;
border-bottom:1px solid #f3f3f3;
transition:.15s;
}

.chatItem:hover{
background:#f7f7f7;
}

.chatItem.active{
background:#e8f3ff;
}

.chatAvatar{
width:52px;
height:52px;
border-radius:50%;
background:#2aabee;
color:white;
display:flex;
align-items:center;
justify-content:center;
font-size:20px;
font-weight:700;
flex-shrink:0;
}

.chatContent{
flex:1;
padding-left:12px;
overflow:hidden;
}

.chatTitle{
font-size:16px;
font-weight:600;
color:#111;
white-space:nowrap;
overflow:hidden;
text-overflow:ellipsis;
}

.chatPreview{
font-size:14px;
color:#7b7b7b;
margin-top:3px;
white-space:nowrap;
overflow:hidden;
text-overflow:ellipsis;
}

.chatTime{
font-size:12px;
color:#999;
margin-left:10px;
}

/* ===== CHAT ===== */

#chat{
flex:1;
display:flex;
flex-direction:column;
background:#d7e3ec;
background-image:
linear-gradient(
rgba(255,255,255,.2),
rgba(255,255,255,.2)
);
}

#chatHeader{
height:60px;
background:#fff;
display:flex;
align-items:center;
padding:0 14px;
border-bottom:1px solid #e7e7e7;
flex-shrink:0;
}

#chatAvatar{
width:40px;
height:40px;
border-radius:50%;
background:#2aabee;
color:white;
display:flex;
align-items:center;
justify-content:center;
font-weight:700;
font-size:18px;
}

#chatHeaderInfo{
padding-left:10px;
}

#chatTitle{
font-size:16px;
font-weight:700;
color:#111;
}

#chatSubTitle{
font-size:13px;
color:#777;
margin-top:2px;
}

#messages{
flex:1;
overflow-y:auto;
padding:14px;
display:flex;
flex-direction:column;
}

.welcome{
margin:auto;
background:rgba(255,255,255,.9);
padding:14px 18px;
border-radius:14px;
font-size:15px;
color:#666;
text-align:center;
}

.message{
align-self:flex-end;
max-width:78%;
background:#e7ffdb;
padding:8px 12px;
border-radius:18px;
margin-bottom:10px;
box-shadow:
0 1px 2px rgba(0,0,0,.08);
word-break:break-word;
position:relative;
}

.messageText{
font-size:15px;
line-height:1.35;
color:#111;
padding-right:40px;
}

.messageTime{
position:absolute;
right:10px;
bottom:6px;
font-size:11px;
color:#7f8a7f;
}

.dateSeparator{
align-self:center;
background:rgba(255,255,255,.95);
padding:6px 12px;
border-radius:20px;
font-size:13px;
color:#666;
margin-bottom:12px;
}

/* ===== COMPOSER ===== */

#composer{
height:64px;
background:#fff;
display:flex;
align-items:center;
padding:0 10px;
gap:10px;
border-top:1px solid #e5e5e5;
}

#messageInput{
flex:1;
height:42px;
border:none;
outline:none;
background:#f2f2f2;
border-radius:22px;
padding:0 16px;
font-size:15px;
}

#sendBtn{
width:42px;
height:42px;
border:none;
border-radius:50%;
background:#2aabee;
color:white;
font-size:18px;
cursor:pointer;
}

/* ===== MODAL ===== */

.modal{
position:fixed;
inset:0;
background:rgba(0,0,0,.3);
display:flex;
align-items:center;
justify-content:center;
z-index:100;
}

.hidden{
display:none !important;
}

.modalCard{
width:320px;
background:white;
border-radius:18px;
padding:20px;
}

.modalTitle{
font-size:18px;
font-weight:700;
margin-bottom:16px;
}

#chatNameInput{
width:100%;
height:42px;
border:1px solid #ddd;
border-radius:10px;
padding:0 12px;
font-size:15px;
}

.modalButtons{
display:flex;
justify-content:flex-end;
gap:10px;
margin-top:16px;
}

.modalButtons button{
height:38px;
padding:0 16px;
border:none;
border-radius:10px;
cursor:pointer;
}

#cancelChatBtn{
background:#f2f2f2;
}

#saveChatBtn{
background:#2aabee;
color:white;
}

/* ===== MENU ===== */

#messageMenu{
position:fixed;
background:#fff;
border-radius:12px;
overflow:hidden;
box-shadow:
0 10px 30px rgba(0,0,0,.15);
z-index:999;
}

#messageMenu button{
display:block;
width:180px;
height:44px;
border:none;
background:white;
text-align:left;
padding:0 14px;
cursor:pointer;
}

#messageMenu button:hover{
background:#f4f4f4;
}

/* ===== MOBILE ===== */

@media(max-width:900px){

#sidebar{
width:100%;
min-width:100%;
}

#chat{
display:none;
}

body.chatOpened #sidebar{
display:none;
}

body.chatOpened #chat{
display:flex;
width:100%;
}

}
  
</style>

</head>

<body>

<div id="app">

    <!-- ЛЕВАЯ КОЛОНКА -->

    <aside id="sidebar">

        <div class="sidebarTop">

            <div class="telegramLogo">
                Telegram
            </div>

            <button id="newChatBtn">
                +
            </button>

        </div>

        <div class="searchBlock">

            <input
                id="searchInput"
                placeholder="Поиск"
                autocomplete="off">

        </div>

        <div id="chatList">

        </div>

    </aside>

    <!-- ЧАТ -->

    <main id="chat">

        <div id="chatHeader">

            <div id="chatAvatar">
                T
            </div>

            <div id="chatHeaderInfo">

                <div id="chatTitle">
                    Telegram Notes
                </div>

                <div id="chatSubTitle">
                    Личные заметки
                </div>

            </div>

        </div>

        <div id="messages">

            <div class="welcome">

                Выберите чат
                <br>
                или создайте новый

            </div>

        </div>

        <div id="composer">

            <input
                id="messageInput"
                placeholder="Сообщение">

            <button id="sendBtn">
                ➤
            </button>

        </div>

    </main>

</div>

<!-- МОДАЛКА ЧАТА -->

<div id="chatModal" class="modal hidden">

    <div class="modalCard">

        <div class="modalTitle">
            Новый чат
        </div>

        <input
            id="chatNameInput"
            placeholder="Выпускные / Конкурсы">

        <div class="modalButtons">

            <button id="cancelChatBtn">
                Отмена
            </button>

            <button id="saveChatBtn">
                Создать
            </button>

        </div>

    </div>

</div>

<!-- МЕНЮ СООБЩЕНИЯ -->

<div id="messageMenu" class="hidden">

    <button id="editBtn">
        Редактировать
    </button>

    <button id="deleteBtn">
        Удалить
    </button>

</div>

<script>

/* ===== JS БУДЕТ В ЧАСТИ 3 ===== */

const STORAGE_KEY = "telegram_notes_v1";

let data = JSON.parse(
localStorage.getItem(STORAGE_KEY)
) || {
    chats:[]
};

let currentChatId = null;
let editingMessageId = null;

const chatList = document.getElementById("chatList");
const messages = document.getElementById("messages");

const newChatBtn = document.getElementById("newChatBtn");
const chatModal = document.getElementById("chatModal");

const chatNameInput =
document.getElementById("chatNameInput");

const saveChatBtn =
document.getElementById("saveChatBtn");

const cancelChatBtn =
document.getElementById("cancelChatBtn");

const messageInput =
document.getElementById("messageInput");

const sendBtn =
document.getElementById("sendBtn");

const searchInput =
document.getElementById("searchInput");

const chatTitle =
document.getElementById("chatTitle");

const chatAvatar =
document.getElementById("chatAvatar");

const menu =
document.getElementById("messageMenu");

const editBtn =
document.getElementById("editBtn");

const deleteBtn =
document.getElementById("deleteBtn");

let selectedMessageId = null;

/* ========================= */

function save(){

localStorage.setItem(
STORAGE_KEY,
JSON.stringify(data)
);

}

/* ========================= */

function uid(){

return Date.now().toString() +
Math.random().toString(36).slice(2);

}

/* ========================= */

function timeString(){

const d = new Date();

return d.toLocaleTimeString(
[],
{
hour:"2-digit",
minute:"2-digit"
}
);

}

/* ========================= */

function renderChats(){

chatList.innerHTML = "";

const query =
searchInput.value.trim().toLowerCase();

data.chats
.filter(chat=>{

if(!query) return true;

return chat.name
.toLowerCase()
.includes(query);

})
.forEach(chat=>{

const item =
document.createElement("div");

item.className =
"chatItem" +
(currentChatId===chat.id
? " active"
: "");

const last =
chat.messages.length
? chat.messages[
chat.messages.length-1
].text
: "Нет сообщений";

item.innerHTML = `
<div class="chatAvatar">
${chat.name.charAt(0).toUpperCase()}
</div>

<div class="chatContent">

<div class="chatTitle">
${escapeHtml(chat.name)}
</div>

<div class="chatPreview">
${escapeHtml(last)}
</div>

</div>

<div class="chatTime">

${chat.messages.length
? chat.messages[
chat.messages.length-1
].time
: ""}

</div>
`;

item.onclick = ()=>{

currentChatId = chat.id;

renderChats();
renderMessages();

if(window.innerWidth<900){

document.body
.classList
.add("chatOpened");

}

};

chatList.appendChild(item);

});

}

/* ========================= */

function renderMessages(){

const chat =
data.chats.find(
c=>c.id===currentChatId
);

if(!chat){

messages.innerHTML = `
<div class="welcome">
Выберите чат
</div>
`;

chatTitle.textContent =
"Telegram Notes";

chatAvatar.textContent = "T";

return;

}

chatTitle.textContent =
chat.name;

chatAvatar.textContent =
chat.name
.charAt(0)
.toUpperCase();

messages.innerHTML = "";

const date =
document.createElement("div");

date.className =
"dateSeparator";

date.textContent =
"Сегодня";

messages.appendChild(date);

chat.messages.forEach(msg=>{

const div =
document.createElement("div");

div.className =
"message";

div.dataset.id =
msg.id;

div.innerHTML = `
<div class="messageText">
${escapeHtml(msg.text)}
</div>

<div class="messageTime">
${msg.time}
</div>
`;

let pressTimer;

div.addEventListener(
"touchstart",
()=>{

pressTimer =
setTimeout(()=>{

openMenu(
msg.id,
event.touches[0].clientX,
event.touches[0].clientY
);

},500);

}
);

div.addEventListener(
"touchend",
()=>{

clearTimeout(
pressTimer
);

}
);

div.addEventListener(
"contextmenu",
e=>{

e.preventDefault();

openMenu(
msg.id,
e.clientX,
e.clientY
);

}
);

messages.appendChild(div);

});

messages.scrollTop =
messages.scrollHeight;

}

/* ========================= */

function addMessage(){

const text =
messageInput.value.trim();

if(!text) return;

const chat =
data.chats.find(
c=>c.id===currentChatId
);

if(!chat) return;

if(editingMessageId){

const msg =
chat.messages.find(
m=>m.id===editingMessageId
);

if(msg){

msg.text = text;

}

editingMessageId = null;

}else{

chat.messages.push({

id:uid(),
text,
time:timeString()

});

}

messageInput.value = "";

save();

renderChats();
renderMessages();

}

/* ========================= */

function createChat(){

const name =
chatNameInput.value.trim();

if(!name) return;

const chat = {

id:uid(),
name,
messages:[]

};

data.chats.unshift(chat);

currentChatId = chat.id;

chatNameInput.value = "";

chatModal.classList.add(
"hidden"
);

save();

renderChats();
renderMessages();

}

/* ========================= */

function openMenu(
messageId,
x,
y
){

selectedMessageId =
messageId;

menu.style.left =
x + "px";

menu.style.top =
y + "px";

menu.classList.remove(
"hidden"
);

}

/* ========================= */

function closeMenu(){

menu.classList.add(
"hidden"
);

}

/* ========================= */

editBtn.onclick = ()=>{

const chat =
data.chats.find(
c=>c.id===currentChatId
);

if(!chat) return;

const msg =
chat.messages.find(
m=>m.id===selectedMessageId
);

if(!msg) return;

messageInput.value =
msg.text;

editingMessageId =
msg.id;

closeMenu();

};

/* ========================= */

deleteBtn.onclick = ()=>{

const chat =
data.chats.find(
c=>c.id===currentChatId
);

if(!chat) return;

chat.messages =
chat.messages.filter(
m=>m.id!==selectedMessageId
);

save();

renderChats();
renderMessages();

closeMenu();

};

/* ========================= */

function escapeHtml(text){

return text
.replaceAll("&","&amp;")
.replaceAll("<","&lt;")
.replaceAll(">","&gt;")
.replaceAll('"',"&quot;");

}

/* ========================= */

newChatBtn.onclick = ()=>{

chatModal.classList.remove(
"hidden"
);

chatNameInput.focus();

};

cancelChatBtn.onclick = ()=>{

chatModal.classList.add(
"hidden"
);

};

saveChatBtn.onclick =
createChat;

sendBtn.onclick =
addMessage;

messageInput.addEventListener(
"keydown",
e=>{

if(e.key==="Enter"){

addMessage();

}

}
);

searchInput.addEventListener(
"input",
renderChats
);

document.addEventListener(
"click",
e=>{

if(
!menu.contains(e.target)
){

closeMenu();

}

}
);

/* ========================= */

if(data.chats.length===0){

data.chats.push({

id:uid(),
name:"Выпускные / Конкурсы",
messages:[
{
id:uid(),
text:"Первая заметка",
time:timeString()
}
]

});

currentChatId =
data.chats[0].id;

save();

}else{

currentChatId =
data.chats[0].id;

}

renderChats();
renderMessages();
  
</script>

</body>
</html>
