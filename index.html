<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<title>Telegram Notes v1.2</title>
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<style>
:root{
  --tg-blue:#007aff;
  --tg-bg:#ffffff;
  --tg-chat-bg:#d9e6ef;
  --tg-line:#e5e5ea;
  --tg-muted:#8e8e93;
  --tg-search:#f1f1f3;
  --tg-out:#dcf8c6;
  --tg-text:#111;
  --tg-yellow:#ffcc00;
  --tg-red:#ff3b30;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{width:100%;height:100%;overflow:hidden;background:#fff;font-family:-apple-system,BlinkMacSystemFont,"SF Pro Text","Helvetica Neue",Arial,sans-serif;color:var(--tg-text);user-select:none;-webkit-user-select:none}
body{position:fixed;inset:0}
button,input,select{font:inherit}
button{cursor:pointer}
#app{width:100%;height:100%;display:flex;background:#fff}

/* LEFT */
#sidebar{width:390px;min-width:390px;height:100%;background:#fff;border-right:1px solid var(--tg-line);display:flex;flex-direction:column;overflow:hidden}
#topbar{height:54px;display:flex;align-items:center;justify-content:space-between;padding:0 14px;border-bottom:1px solid var(--tg-line);background:#fff;flex-shrink:0}
#topbarTitle{font-size:28px;font-weight:700;letter-spacing:-.6px}
.iconBtn{width:36px;height:36px;border:0;background:transparent;color:var(--tg-blue);font-size:28px;line-height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center}
.iconBtn:active{background:#eef5ff}
#tabs{height:43px;display:flex;align-items:center;gap:8px;padding:6px 10px;border-bottom:1px solid var(--tg-line);overflow-x:auto;background:#fff;flex-shrink:0}
.tab{border:0;background:#f1f1f3;color:#111;border-radius:16px;padding:7px 13px;font-size:14px;white-space:nowrap}
.tab.active{background:var(--tg-blue);color:white}
#searchWrap{height:52px;padding:8px 10px;border-bottom:1px solid var(--tg-line);background:#fff;flex-shrink:0}
#searchInput{width:100%;height:36px;border:0;outline:0;border-radius:10px;background:var(--tg-search);padding:0 12px;font-size:16px;color:#111}
#chatList{flex:1;overflow:auto;background:#fff}
.chatItem{height:76px;display:flex;align-items:center;padding:8px 10px 8px 12px;border-bottom:1px solid #f2f2f2;background:#fff;gap:11px}
.chatItem.active{background:#eaf4ff}
.avatar{width:54px;height:54px;border-radius:50%;background:linear-gradient(135deg,#56ccf2,#2f80ed);display:flex;align-items:center;justify-content:center;color:#fff;font-size:22px;font-weight:700;flex-shrink:0}
.chatMain{min-width:0;flex:1}
.chatRow{display:flex;align-items:center;justify-content:space-between;gap:8px}
.chatName{font-size:17px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;letter-spacing:-.2px}
.chatTime{font-size:13px;color:var(--tg-muted);flex-shrink:0}
.chatPreview{margin-top:4px;font-size:15px;color:var(--tg-muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.emptyList{padding:28px 18px;text-align:center;color:var(--tg-muted);font-size:15px;line-height:1.35}

/* CHAT */
#chat{flex:1;height:100%;display:flex;flex-direction:column;background:var(--tg-chat-bg);position:relative;min-width:0}
#chat:before{content:"";position:absolute;inset:0;opacity:.18;background-image:radial-gradient(circle at 16px 16px,rgba(255,255,255,.75) 1.5px,transparent 1.6px);background-size:32px 32px;pointer-events:none}
#chatHeader{height:54px;background:rgba(255,255,255,.96);border-bottom:1px solid var(--tg-line);display:flex;align-items:center;padding:0 12px;gap:10px;z-index:2;flex-shrink:0}
#backBtn{display:none;border:0;background:transparent;color:var(--tg-blue);font-size:17px;padding:8px 4px}
#headerAvatar{width:38px;height:38px;border-radius:50%;background:linear-gradient(135deg,#56ccf2,#2f80ed);display:flex;align-items:center;justify-content:center;color:#fff;font-weight:700;flex-shrink:0}
#headerInfo{min-width:0;flex:1}
#chatTitle{font-size:17px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;text-align:left}
#chatStatus{font-size:13px;color:var(--tg-muted);margin-top:1px}
#chatMenuBtn{border:0;background:transparent;color:var(--tg-blue);font-size:24px;width:34px;height:34px;border-radius:50%}
#messages{position:relative;z-index:1;flex:1;overflow:auto;padding:14px 12px 10px;display:flex;flex-direction:column}
.welcome{margin:auto;max-width:300px;background:rgba(255,255,255,.9);border-radius:16px;padding:14px 16px;text-align:center;color:#555;line-height:1.35;box-shadow:0 1px 2px rgba(0,0,0,.08)}
.dateSep{align-self:center;background:rgba(255,255,255,.86);border-radius:14px;padding:5px 11px;color:#6d6d72;font-size:13px;margin:2px 0 12px;box-shadow:0 1px 1px rgba(0,0,0,.06)}
.msg{align-self:flex-end;max-width:min(580px,78%);background:var(--tg-out);border-radius:18px 18px 4px 18px;margin:0 0 8px;padding:7px 10px 18px;position:relative;box-shadow:0 1px 2px rgba(0,0,0,.10);white-space:pre-wrap;word-break:break-word;font-size:16px;line-height:1.32}
.msg.editing{outline:2px solid rgba(0,122,255,.35)}
.msgTime{position:absolute;right:9px;bottom:4px;font-size:11px;color:#6f8665}
#composer{height:58px;background:rgba(255,255,255,.96);border-top:1px solid var(--tg-line);display:flex;align-items:center;gap:8px;padding:7px 9px calc(7px + env(safe-area-inset-bottom));z-index:2;flex-shrink:0}
#messageInput{height:40px;flex:1;border:1px solid #ddd;border-radius:20px;background:#fff;outline:0;padding:0 15px;font-size:16px;user-select:text;-webkit-user-select:text}
#sendBtn{width:40px;height:40px;border:0;border-radius:50%;background:var(--tg-blue);color:#fff;font-size:18px;display:flex;align-items:center;justify-content:center}
#sendBtn:active{filter:brightness(.92)}

/* MODALS */
.hidden{display:none!important}
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.28);z-index:20;display:flex;align-items:center;justify-content:center;padding:18px}
.card{width:min(380px,100%);background:#fff;border-radius:18px;box-shadow:0 18px 60px rgba(0,0,0,.22);overflow:hidden}
.cardHead{padding:18px 18px 10px;font-size:20px;font-weight:700}
.cardBody{padding:0 18px 18px}
.fieldLabel{font-size:13px;color:var(--tg-muted);margin:10px 2px 6px}
.cardInput,.cardSelect{width:100%;height:44px;border:1px solid #d8d8dd;border-radius:12px;outline:0;padding:0 12px;font-size:16px;background:#fff;user-select:text;-webkit-user-select:text}
.cardActions{display:flex;border-top:1px solid var(--tg-line)}
.cardActions button{height:48px;flex:1;border:0;background:#fff;color:var(--tg-blue);font-size:16px}
.cardActions button+button{border-left:1px solid var(--tg-line);font-weight:600}
#msgMenu,#chatActions,#plusMenu{position:fixed;z-index:30;background:#fff;border-radius:14px;box-shadow:0 12px 35px rgba(0,0,0,.20);overflow:hidden;min-width:210px}
.menuBtn{height:46px;width:100%;border:0;background:#fff;text-align:left;padding:0 16px;font-size:16px;color:#111}
.menuBtn:active{background:#f2f2f7}
.menuBtn.danger{color:#ff3b30}


#msgSearchWrap{height:0;overflow:hidden;background:rgba(255,255,255,.96);border-bottom:0;z-index:2;transition:height .18s ease;padding:0 10px;flex-shrink:0}
#msgSearchWrap.open{height:49px;border-bottom:1px solid var(--tg-line);padding:7px 10px}
#msgSearchInput{width:100%;height:35px;border:0;outline:0;border-radius:10px;background:var(--tg-search);padding:0 12px;font-size:15px;color:#111;user-select:text;-webkit-user-select:text}
.pinnedBar{z-index:2;background:rgba(255,255,255,.96);border-bottom:1px solid var(--tg-line);padding:8px 12px;font-size:14px;color:#111;display:flex;gap:8px;align-items:center;min-height:39px;flex-shrink:0}
.pinnedBar span:first-child{color:var(--tg-blue);font-size:15px}
.pinnedText{white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:#555}
.msg.pin{border-top:3px solid rgba(0,122,255,.42)}
.msg.fav:before{content:"⭐";position:absolute;left:8px;bottom:3px;font-size:11px;opacity:.9}
.msg.pin:after{content:"📌";position:absolute;left:24px;bottom:3px;font-size:11px;opacity:.9}
.msg.deleted{background:#f2f2f7;color:#777;border-radius:18px}
.trashNotice{align-self:center;background:rgba(255,255,255,.9);border-radius:14px;padding:7px 12px;color:#666;font-size:13px;margin:0 0 10px;box-shadow:0 1px 1px rgba(0,0,0,.06)}
.chatItem.dragging{opacity:.45}
.chatItem.dragOver{background:#f1f8ff}
.dragHandle{font-size:20px;color:#c7c7cc;line-height:1;cursor:grab;padding:8px 0}

/* MOBILE */
@media(max-width:900px){
  #sidebar{width:100%;min-width:100%}
  #chat{display:none}
  body.chatOpen #sidebar{display:none}
  body.chatOpen #chat{display:flex;width:100%}
  body.chatOpen #backBtn{display:block}
  #topbarTitle{font-size:27px}
  .msg{max-width:84%}
}
@media(min-width:901px){
  #chat{display:flex}
}
</style>
</head>
<body>
<div id="app">
  <aside id="sidebar">
    <div id="topbar">
      <div id="topbarTitle">Чаты</div>
      <button id="newChatBtn" class="iconBtn" type="button" aria-label="Создать">＋</button>
    </div>
    <div id="tabs"></div>
    <div id="searchWrap">
      <input id="searchInput" placeholder="Поиск" autocomplete="off">
    </div>
    <div id="chatList"></div>
  </aside>

  <main id="chat">
    <div id="chatHeader">
      <button id="backBtn" type="button">‹ Чаты</button>
      <div id="headerAvatar">T</div>
      <div id="headerInfo">
        <div id="chatTitle">Telegram Notes</div>
        <div id="chatStatus">Личные заметки</div>
      </div>
      <button id="chatMenuBtn" type="button">⋯</button>
    </div>
    <div id="msgSearchWrap"><input id="msgSearchInput" placeholder="Поиск по заметкам" autocomplete="off"></div>
    <div id="pinnedBar" class="pinnedBar hidden"></div>
    <div id="messages"></div>
    <div id="composer">
      <input id="messageInput" placeholder="Сообщение" autocomplete="off">
      <button id="sendBtn" type="button">↑</button>
    </div>
  </main>
</div>

<div id="topicModal" class="overlay hidden">
  <div class="card">
    <div class="cardHead" id="topicModalTitle">Новая подтема</div>
    <div class="cardBody">
      <div class="fieldLabel">Группа</div>
      <input id="groupInput" class="cardInput" list="groupList" placeholder="Например: Выпускные">
      <datalist id="groupList"></datalist>
      <div class="fieldLabel">Подтема</div>
      <input id="topicInput" class="cardInput" placeholder="Например: Конкурсы">
    </div>
    <div class="cardActions">
      <button id="cancelTopicBtn" type="button">Отмена</button>
      <button id="saveTopicBtn" type="button">Создать</button>
    </div>
  </div>
</div>

<div id="msgMenu" class="hidden">
  <button id="editMsgBtn" class="menuBtn" type="button">Редактировать</button>
  <button id="copyMsgBtn" class="menuBtn" type="button">Копировать</button>
  <button id="pinMsgBtn" class="menuBtn" type="button">Закрепить</button>
  <button id="favMsgBtn" class="menuBtn" type="button">В избранное</button>
  <button id="restoreMsgBtn" class="menuBtn hidden" type="button">Восстановить</button>
  <button id="deleteForeverMsgBtn" class="menuBtn danger hidden" type="button">Удалить навсегда</button>
  <button id="deleteMsgBtn" class="menuBtn danger" type="button">Удалить</button>
</div>

<div id="chatActions" class="hidden">
  <button id="toggleMsgSearchBtn" class="menuBtn" type="button">Поиск по заметкам</button>
  <button id="toggleFavoritesBtn" class="menuBtn" type="button">Показать избранное</button>
  <button id="toggleTrashBtn" class="menuBtn" type="button">Корзина</button>
  <button id="sortDateBtn" class="menuBtn" type="button">Сначала новые</button>
  <button id="renameTopicBtn" class="menuBtn" type="button">Переименовать</button>
  <button id="deleteTopicBtn" class="menuBtn danger" type="button">Удалить подтему</button>
</div>

<div id="plusMenu" class="hidden">
  <button id="newTopicMenuBtn" class="menuBtn" type="button">Новая подтема</button>
  <button id="newGroupMenuBtn" class="menuBtn" type="button">Новая группа</button>
</div>

<script>
(function(){
"use strict";

const STORAGE_KEY = "telegram_notes_ios_v12";
const OLD_KEYS = ["telegram_notes_ios_v11", "telegram_notes_ios_v1"];
const $ = (id) => document.getElementById(id);

const els = {
  body: document.body,
  tabs: $("tabs"), chatList: $("chatList"), searchInput: $("searchInput"), newChatBtn: $("newChatBtn"),
  topicModal: $("topicModal"), topicModalTitle: $("topicModalTitle"), groupInput: $("groupInput"), topicInput: $("topicInput"), groupList: $("groupList"), saveTopicBtn: $("saveTopicBtn"), cancelTopicBtn: $("cancelTopicBtn"),
  msgSearchWrap: $("msgSearchWrap"), msgSearchInput: $("msgSearchInput"), pinnedBar: $("pinnedBar"), messages: $("messages"), messageInput: $("messageInput"), sendBtn: $("sendBtn"),
  chatTitle: $("chatTitle"), chatStatus: $("chatStatus"), headerAvatar: $("headerAvatar"), backBtn: $("backBtn"), chatMenuBtn: $("chatMenuBtn"),
  msgMenu: $("msgMenu"), editMsgBtn: $("editMsgBtn"), copyMsgBtn: $("copyMsgBtn"), deleteMsgBtn: $("deleteMsgBtn"), pinMsgBtn: $("pinMsgBtn"), favMsgBtn: $("favMsgBtn"), restoreMsgBtn: $("restoreMsgBtn"), deleteForeverMsgBtn: $("deleteForeverMsgBtn"),
  chatActions: $("chatActions"), toggleMsgSearchBtn: $("toggleMsgSearchBtn"), toggleFavoritesBtn: $("toggleFavoritesBtn"), toggleTrashBtn: $("toggleTrashBtn"), sortDateBtn: $("sortDateBtn"), renameTopicBtn: $("renameTopicBtn"), deleteTopicBtn: $("deleteTopicBtn"),
  plusMenu: $("plusMenu"), newTopicMenuBtn: $("newTopicMenuBtn"), newGroupMenuBtn: $("newGroupMenuBtn")
};

let state = load();
let currentTopicId = firstTopicId();
let currentGroupFilter = "Все";
let selectedMessageId = null;
let editingMessageId = null;
let modalMode = "createTopic";
let msgSearchOpen = false;
let showFavoritesOnly = false;
let showTrash = false;
let sortNewestFirst = false;
let dragTopicId = null;

function uid(){ return "id_" + Date.now().toString(36) + "_" + Math.random().toString(36).slice(2,9); }
function timeNow(){ return new Date().toLocaleTimeString("ru-RU",{hour:"2-digit",minute:"2-digit"}); }
function escapeHtml(value){ return String(value ?? "").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;").replace(/'/g,"&#039;"); }
function splitLegacyName(name){ const parts=String(name||"").split("/"); return parts.length>=2 ? {group:parts[0].trim()||"Без группы", topic:parts.slice(1).join("/").trim()||"Без названия"} : {group:"Без группы", topic:String(name||"Без названия").trim()}; }
function defaultState(){ const now=Date.now(); const g1={id:uid(),name:"Выпускные",createdAt:now}, g2={id:uid(),name:"Мафия",createdAt:now}, g3={id:uid(),name:"Контент",createdAt:now}; return {groups:[g1,g2,g3],topics:[{id:uid(),groupId:g1.id,name:"Конкурсы",createdAt:now,messages:[{id:uid(),text:"Версия 1.2: закрепы, избранное, корзина, поиск, сортировка и перетаскивание подтем.",time:timeNow(),createdAt:now,pinned:true}]},{id:uid(),groupId:g1.id,name:"Музыка",createdAt:now,messages:[]},{id:uid(),groupId:g2.id,name:"Идеи",createdAt:now,messages:[]},{id:uid(),groupId:g3.id,name:"VK",createdAt:now,messages:[]}]}; }
function normalize(s){
  if(!s || !Array.isArray(s.groups) || !Array.isArray(s.topics)) return defaultState();
  s.topics.forEach((t,i)=>{ t.order = Number.isFinite(t.order) ? t.order : i; t.messages = Array.isArray(t.messages) ? t.messages : []; t.messages.forEach(m=>{ m.createdAt=m.createdAt||Date.now(); m.time=m.time||timeNow(); m.pinned=!!m.pinned; m.favorite=!!m.favorite; }); });
  return s;
}
function migrateFromV1(old){ const s={groups:[],topics:[]}, map=new Map(); const gid=n=>{ if(!map.has(n)){ const id=uid(); map.set(n,id); s.groups.push({id,name:n,createdAt:Date.now()}); } return map.get(n);}; (old.chats||[]).forEach((c,i)=>{ const p=splitLegacyName(c.name); s.topics.push({id:c.id||uid(),groupId:gid(p.group),name:p.topic,createdAt:c.createdAt||Date.now(),order:i,messages:Array.isArray(c.messages)?c.messages:[]}); }); return normalize(s); }
function load(){
  try{ const raw=localStorage.getItem(STORAGE_KEY); if(raw) return normalize(JSON.parse(raw)); }catch(e){}
  for(const key of OLD_KEYS){ try{ const raw=localStorage.getItem(key); if(!raw) continue; const old=JSON.parse(raw); if(old?.groups && old?.topics) return normalize(old); if(old?.chats) return migrateFromV1(old); }catch(e){} }
  return defaultState();
}
function save(){ localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); }
function firstTopicId(){ return sortedTopicsAll()[0]?.id || state.topics[0]?.id || null; }
function groupById(id){ return state.groups.find(g=>g.id===id)||null; }
function currentTopic(){ return state.topics.find(t=>t.id===currentTopicId)||null; }
function fullTopicName(topic){ const group=groupById(topic.groupId); return (group?.name||"Без группы")+" / "+topic.name; }
function initials(topic){ const group=groupById(topic.groupId); return (group?.name||topic.name||"T").trim().charAt(0).toUpperCase()||"T"; }
function sortedTopicsAll(){ return [...state.topics].sort((a,b)=>(a.order??0)-(b.order??0)); }
function activeMessages(topic){ return topic.messages.filter(m => showTrash ? !!m.deletedAt : !m.deletedAt); }
function visibleMessages(topic){
  let arr = activeMessages(topic);
  const q = els.msgSearchInput.value.trim().toLowerCase();
  if(showFavoritesOnly) arr = arr.filter(m=>m.favorite && !m.deletedAt);
  if(q) arr = arr.filter(m=>String(m.text).toLowerCase().includes(q));
  arr = [...arr].sort((a,b)=> sortNewestFirst ? (b.createdAt||0)-(a.createdAt||0) : (a.createdAt||0)-(b.createdAt||0));
  if(!sortNewestFirst){ arr.sort((a,b)=>(b.pinned?1:0)-(a.pinned?1:0) || (a.createdAt||0)-(b.createdAt||0)); }
  return arr;
}
function lastMessage(topic){ const msgs=topic.messages.filter(m=>!m.deletedAt); if(!msgs.length) return "Нет сообщений"; const pins=msgs.filter(m=>m.pinned).length; return (pins?"📌 ":"") + (msgs.at(-1).text || "Вложение"); }
function render(){ renderGroups(); renderTopics(); renderMessages(); }
function renderGroups(){
  const groups=["Все",...state.groups.map(g=>g.name)]; if(currentGroupFilter!=="Все"&&!state.groups.some(g=>g.name===currentGroupFilter)) currentGroupFilter="Все";
  els.tabs.innerHTML=""; groups.forEach(name=>{ const btn=document.createElement("button"); btn.className="tab"+(name===currentGroupFilter?" active":""); btn.type="button"; btn.textContent=name; btn.onclick=()=>{currentGroupFilter=name;renderGroups();renderTopics();}; els.tabs.appendChild(btn); });
  els.groupList.innerHTML=""; state.groups.forEach(g=>{ const opt=document.createElement("option"); opt.value=g.name; els.groupList.appendChild(opt); });
}
function filteredTopics(){ const q=els.searchInput.value.trim().toLowerCase(); return sortedTopicsAll().filter(t=>{ const group=groupById(t.groupId); const full=fullTopicName(t).toLowerCase(); const inGroup=currentGroupFilter==="Все"||group?.name===currentGroupFilter; const inSearch=!q||full.includes(q)||t.messages.some(m=>!m.deletedAt&&String(m.text).toLowerCase().includes(q)); return inGroup&&inSearch; }); }
function renderTopics(){
  const topics=filteredTopics(); els.chatList.innerHTML="";
  if(!topics.length){ els.chatList.innerHTML='<div class="emptyList">Ничего не найдено<br>Нажми плюсик, чтобы создать подтему</div>'; return; }
  topics.forEach(topic=>{ const item=document.createElement("div"); item.className="chatItem"+(topic.id===currentTopicId?" active":""); item.draggable=true; item.dataset.id=topic.id; item.innerHTML=`<div class="dragHandle">≡</div><div class="avatar">${escapeHtml(initials(topic))}</div><div class="chatMain"><div class="chatRow"><div class="chatName">${escapeHtml(fullTopicName(topic))}</div><div class="chatTime">${escapeHtml(topic.messages.filter(m=>!m.deletedAt).at(-1)?.time||"")}</div></div><div class="chatPreview">${escapeHtml(lastMessage(topic))}</div></div>`;
    item.addEventListener("click",()=>{ currentTopicId=topic.id; editingMessageId=null; showTrash=false; showFavoritesOnly=false; closeMenus(); render(); if(window.innerWidth<=900) els.body.classList.add("chatOpen"); setTimeout(()=>els.messageInput.focus(),80); });
    item.addEventListener("dragstart",e=>{ dragTopicId=topic.id; item.classList.add("dragging"); e.dataTransfer.effectAllowed="move"; });
    item.addEventListener("dragend",()=>{ dragTopicId=null; item.classList.remove("dragging"); document.querySelectorAll('.dragOver').forEach(x=>x.classList.remove('dragOver')); });
    item.addEventListener("dragover",e=>{ if(!dragTopicId||dragTopicId===topic.id) return; e.preventDefault(); item.classList.add("dragOver"); });
    item.addEventListener("dragleave",()=>item.classList.remove("dragOver"));
    item.addEventListener("drop",e=>{ e.preventDefault(); reorderTopic(dragTopicId, topic.id); });
    els.chatList.appendChild(item); });
}
function reorderTopic(fromId,toId){ if(!fromId||!toId||fromId===toId) return; const arr=sortedTopicsAll(); const from=arr.findIndex(t=>t.id===fromId), to=arr.findIndex(t=>t.id===toId); if(from<0||to<0) return; const [m]=arr.splice(from,1); arr.splice(to,0,m); arr.forEach((t,i)=>t.order=i); save(); renderTopics(); }
function renderMessages(){
  const topic=currentTopic();
  if(!topic){ els.chatTitle.textContent="Telegram Notes"; els.chatStatus.textContent="Личные заметки"; els.headerAvatar.textContent="T"; els.pinnedBar.classList.add("hidden"); els.messages.innerHTML='<div class="welcome">Выберите подтему<br>или создай новую через плюсик</div>'; return; }
  els.chatTitle.textContent=fullTopicName(topic); const live=topic.messages.filter(m=>!m.deletedAt).length, trash=topic.messages.filter(m=>m.deletedAt).length; els.chatStatus.textContent=(showTrash?`Корзина: ${trash}`:showFavoritesOnly?`Избранное: ${topic.messages.filter(m=>m.favorite&&!m.deletedAt).length}`:`${live} заметок`); els.headerAvatar.textContent=initials(topic);
  els.msgSearchWrap.classList.toggle("open", msgSearchOpen);
  const pinned=topic.messages.filter(m=>m.pinned&&!m.deletedAt); if(pinned.length&&!showTrash){ els.pinnedBar.innerHTML=`<span>📌</span><div class="pinnedText">${escapeHtml(pinned[0].text)}</div>`; els.pinnedBar.classList.remove("hidden"); } else els.pinnedBar.classList.add("hidden");
  els.messages.innerHTML='<div class="dateSep">Сегодня</div>';
  if(showTrash) els.messages.innerHTML += '<div class="trashNotice">Корзина. Здесь можно восстановить или удалить навсегда.</div>';
  if(showFavoritesOnly) els.messages.innerHTML += '<div class="trashNotice">Показаны только избранные заметки.</div>';
  const msgs=visibleMessages(topic);
  if(!msgs.length){ const empty=document.createElement("div"); empty.className="welcome"; empty.innerHTML=showTrash?"Корзина пустая":showFavoritesOnly?"Избранных заметок пока нет":"Пока пусто<br>Напиши первую заметку снизу"; els.messages.appendChild(empty); return; }
  msgs.forEach(msg=>{ const div=document.createElement("div"); div.className="msg"+(editingMessageId===msg.id?" editing":"")+(msg.pinned?" pin":"")+(msg.favorite?" fav":"")+(msg.deletedAt?" deleted":""); div.dataset.id=msg.id; div.innerHTML=`${escapeHtml(msg.text)}<span class="msgTime">${escapeHtml(msg.time)}</span>`;
    let timer=null; div.addEventListener("touchstart",e=>{ if(!e.touches?.[0]) return; const x=e.touches[0].clientX,y=e.touches[0].clientY; timer=setTimeout(()=>openMessageMenu(msg.id,x,y),420); },{passive:true}); div.addEventListener("touchmove",()=>timer&&clearTimeout(timer),{passive:true}); div.addEventListener("touchend",()=>timer&&clearTimeout(timer),{passive:true}); div.addEventListener("contextmenu",e=>{ e.preventDefault(); openMessageMenu(msg.id,e.clientX,e.clientY); }); div.addEventListener("dblclick",()=>!showTrash&&startEditMessage(msg.id)); els.messages.appendChild(div); });
  requestAnimationFrame(()=>{ els.messages.scrollTop = sortNewestFirst ? 0 : els.messages.scrollHeight; });
}
function openPlusMenu(){ closeMessageMenu(); closeChatActions(); const r=els.newChatBtn.getBoundingClientRect(); els.plusMenu.style.left=Math.max(8,Math.min(r.right-210,window.innerWidth-218))+"px"; els.plusMenu.style.top=(r.bottom+8)+"px"; els.plusMenu.classList.toggle("hidden"); }
function closePlusMenu(){ els.plusMenu.classList.add("hidden"); }
function openTopicModal(mode){ modalMode=mode||"createTopic"; closeMenus(); const topic=currentTopic(); const group=topic?groupById(topic.groupId):null; if(modalMode==="renameTopic"&&topic){ els.topicModalTitle.textContent="Переименовать"; els.saveTopicBtn.textContent="Сохранить"; els.groupInput.value=group?.name||""; els.topicInput.value=topic.name; } else if(modalMode==="createGroup"){ els.topicModalTitle.textContent="Новая группа"; els.saveTopicBtn.textContent="Создать"; els.groupInput.value=""; els.topicInput.value="Общее"; } else { els.topicModalTitle.textContent="Новая подтема"; els.saveTopicBtn.textContent="Создать"; els.groupInput.value=currentGroupFilter!=="Все"?currentGroupFilter:(group?.name||""); els.topicInput.value=""; } els.topicModal.classList.remove("hidden"); setTimeout(()=>{els.groupInput.focus();els.groupInput.select();},50); }
function closeTopicModal(){ els.topicModal.classList.add("hidden"); els.groupInput.value=""; els.topicInput.value=""; modalMode="createTopic"; }
function findOrCreateGroup(name){ let group=state.groups.find(g=>g.name.toLowerCase()===name.toLowerCase()); if(group) return group; group={id:uid(),name,createdAt:Date.now()}; state.groups.push(group); return group; }
function saveTopicFromModal(){ const groupName=els.groupInput.value.trim(); const topicName=els.topicInput.value.trim()||"Общее"; if(!groupName){els.groupInput.focus();return;} if(modalMode==="renameTopic"){ const topic=currentTopic(); if(topic){ const group=findOrCreateGroup(groupName); topic.groupId=group.id; topic.name=topicName; currentGroupFilter="Все"; } } else { const group=findOrCreateGroup(groupName); const min=Math.min(0,...state.topics.map(t=>t.order??0)); const topic={id:uid(),groupId:group.id,name:topicName,createdAt:Date.now(),order:min-1,messages:[]}; state.topics.unshift(topic); currentTopicId=topic.id; currentGroupFilter="Все"; if(window.innerWidth<=900) els.body.classList.add("chatOpen"); } save(); closeTopicModal(); render(); }
function sendMessage(){ const text=els.messageInput.value.trim(); if(!text) return; const topic=currentTopic(); if(!topic){openTopicModal("createTopic");return;} if(showTrash){ showTrash=false; } if(editingMessageId){ const msg=topic.messages.find(m=>m.id===editingMessageId&&!m.deletedAt); if(msg){msg.text=text;msg.editedAt=Date.now();} editingMessageId=null; } else topic.messages.push({id:uid(),text,time:timeNow(),createdAt:Date.now(),pinned:false,favorite:false}); els.messageInput.value=""; save(); render(); }
function selectedMsg(){ const topic=currentTopic(); return topic?.messages.find(m=>m.id===selectedMessageId); }
function openMessageMenu(messageId,x,y){ selectedMessageId=messageId; const msg=selectedMsg(); closeChatActions(); closePlusMenu(); els.pinMsgBtn.textContent=msg?.pinned?"Открепить":"Закрепить"; els.favMsgBtn.textContent=msg?.favorite?"Убрать из избранного":"В избранное"; const deleted=!!msg?.deletedAt; [els.editMsgBtn,els.copyMsgBtn,els.pinMsgBtn,els.favMsgBtn,els.deleteMsgBtn].forEach(b=>b.classList.toggle("hidden",deleted)); [els.restoreMsgBtn,els.deleteForeverMsgBtn].forEach(b=>b.classList.toggle("hidden",!deleted)); els.msgMenu.style.left=Math.max(8,Math.min(x,window.innerWidth-218))+"px"; els.msgMenu.style.top=Math.max(8,Math.min(y,window.innerHeight-260))+"px"; els.msgMenu.classList.remove("hidden"); }
function closeMessageMenu(){ els.msgMenu.classList.add("hidden"); }
function openChatActions(){ closeMessageMenu(); closePlusMenu(); els.toggleFavoritesBtn.textContent=showFavoritesOnly?"Показать все":"Показать избранное"; els.toggleTrashBtn.textContent=showTrash?"Выйти из корзины":"Корзина"; els.sortDateBtn.textContent=sortNewestFirst?"Сначала старые":"Сначала новые"; const r=els.chatMenuBtn.getBoundingClientRect(); els.chatActions.style.left=Math.max(8,Math.min(r.right-230,window.innerWidth-238))+"px"; els.chatActions.style.top=(r.bottom+6)+"px"; els.chatActions.classList.toggle("hidden"); }
function closeChatActions(){ els.chatActions.classList.add("hidden"); }
function closeMenus(){ closeMessageMenu(); closeChatActions(); closePlusMenu(); }
function startEditMessage(id){ const topic=currentTopic(); const msg=topic?.messages.find(m=>m.id===id&&!m.deletedAt); if(!msg) return; editingMessageId=id; els.messageInput.value=msg.text; closeMenus(); renderMessages(); setTimeout(()=>{els.messageInput.focus();els.messageInput.setSelectionRange(els.messageInput.value.length,els.messageInput.value.length);},30); }
function deleteMessage(){ const msg=selectedMsg(); if(!msg) return; msg.deletedAt=Date.now(); if(editingMessageId===selectedMessageId){editingMessageId=null;els.messageInput.value="";} selectedMessageId=null; save(); closeMenus(); render(); }
function restoreMessage(){ const msg=selectedMsg(); if(!msg) return; delete msg.deletedAt; selectedMessageId=null; save(); closeMenus(); render(); }
function deleteForeverMessage(){ const topic=currentTopic(); if(!topic||!selectedMessageId) return; topic.messages=topic.messages.filter(m=>m.id!==selectedMessageId); selectedMessageId=null; save(); closeMenus(); render(); }
function togglePin(){ const msg=selectedMsg(); if(!msg||msg.deletedAt) return; msg.pinned=!msg.pinned; save(); closeMenus(); render(); }
function toggleFavorite(){ const msg=selectedMsg(); if(!msg||msg.deletedAt) return; msg.favorite=!msg.favorite; save(); closeMenus(); render(); }
async function copyMessage(){ const msg=selectedMsg(); if(!msg) return; try{ await navigator.clipboard.writeText(msg.text); }catch(e){ const temp=document.createElement("textarea"); temp.value=msg.text; document.body.appendChild(temp); temp.select(); document.execCommand("copy"); temp.remove(); } closeMenus(); }
function deleteTopic(){ const topic=currentTopic(); if(!topic) return; if(!confirm("Удалить подтему «"+fullTopicName(topic)+"»?")) return; state.topics=state.topics.filter(t=>t.id!==topic.id); const used=new Set(state.topics.map(t=>t.groupId)); state.groups=state.groups.filter(g=>used.has(g.id)); currentTopicId=firstTopicId(); editingMessageId=null; selectedMessageId=null; save(); closeMenus(); if(!currentTopicId) els.body.classList.remove("chatOpen"); render(); }
function bind(){
  els.newChatBtn.onclick=e=>{e.stopPropagation();openPlusMenu();}; els.newTopicMenuBtn.onclick=()=>openTopicModal("createTopic"); els.newGroupMenuBtn.onclick=()=>openTopicModal("createGroup");
  els.saveTopicBtn.onclick=saveTopicFromModal; els.cancelTopicBtn.onclick=closeTopicModal; els.topicModal.onclick=e=>{if(e.target===els.topicModal)closeTopicModal();}; els.groupInput.onkeydown=e=>{if(e.key==="Enter")els.topicInput.focus(); if(e.key==="Escape")closeTopicModal();}; els.topicInput.onkeydown=e=>{if(e.key==="Enter")saveTopicFromModal(); if(e.key==="Escape")closeTopicModal();};
  els.sendBtn.onclick=sendMessage; els.messageInput.onkeydown=e=>{if(e.key==="Enter")sendMessage(); if(e.key==="Escape"){editingMessageId=null;els.messageInput.value="";renderMessages();}};
  els.searchInput.oninput=renderTopics; els.msgSearchInput.oninput=renderMessages;
  els.backBtn.onclick=()=>{els.body.classList.remove("chatOpen");closeMenus();}; els.chatMenuBtn.onclick=e=>{e.stopPropagation();openChatActions();};
  els.toggleMsgSearchBtn.onclick=()=>{msgSearchOpen=!msgSearchOpen; closeMenus(); renderMessages(); setTimeout(()=>msgSearchOpen&&els.msgSearchInput.focus(),40);};
  els.toggleFavoritesBtn.onclick=()=>{showFavoritesOnly=!showFavoritesOnly; showTrash=false; closeMenus(); renderMessages();};
  els.toggleTrashBtn.onclick=()=>{showTrash=!showTrash; showFavoritesOnly=false; editingMessageId=null; closeMenus(); renderMessages();};
  els.sortDateBtn.onclick=()=>{sortNewestFirst=!sortNewestFirst; closeMenus(); renderMessages();};
  els.renameTopicBtn.onclick=()=>openTopicModal("renameTopic"); els.deleteTopicBtn.onclick=deleteTopic;
  els.editMsgBtn.onclick=()=>startEditMessage(selectedMessageId); els.copyMsgBtn.onclick=copyMessage; els.deleteMsgBtn.onclick=deleteMessage; els.pinMsgBtn.onclick=togglePin; els.favMsgBtn.onclick=toggleFavorite; els.restoreMsgBtn.onclick=restoreMessage; els.deleteForeverMsgBtn.onclick=deleteForeverMessage;
  els.pinnedBar.onclick=()=>{ const topic=currentTopic(); const pin=topic?.messages.find(m=>m.pinned&&!m.deletedAt); if(pin){ const el=els.messages.querySelector(`[data-id="${pin.id}"]`); if(el) el.scrollIntoView({behavior:"smooth",block:"center"}); } };
  document.addEventListener("click",e=>{ if(!els.msgMenu.contains(e.target)&&!e.target.closest(".msg"))closeMessageMenu(); if(!els.chatActions.contains(e.target)&&e.target!==els.chatMenuBtn)closeChatActions(); if(!els.plusMenu.contains(e.target)&&e.target!==els.newChatBtn)closePlusMenu(); });
  window.addEventListener("resize",()=>{if(window.innerWidth>900)els.body.classList.remove("chatOpen");closeMenus();});
}
save(); bind(); render();
})();
</script>
</body>
