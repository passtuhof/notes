<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#17212b">
<title>Личный Telegram — заметник</title>
<style>
:root{
  --tg-bg:#0e1621;--tg-panel:#17212b;--tg-panel-2:#222e3a;--tg-panel-3:#242f3d;--tg-line:rgba(255,255,255,.075);
  --tg-text:#e6edf3;--tg-muted:#7f91a4;--tg-muted2:#607386;--tg-blue:#3390ec;--tg-blue2:#2b5278;--tg-green:#44b37f;
  --bubble:#2b5278;--bubble2:#182533;--danger:#ef5b5b;--warn:#ffd166;--shadow:0 18px 60px rgba(0,0,0,.45);
  --safe-top:env(safe-area-inset-top);--safe-bottom:env(safe-area-inset-bottom)
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}html,body{margin:0;width:100%;height:100%;overflow:hidden;background:#0b1118;color:var(--tg-text);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;touch-action:manipulation;overscroll-behavior:none}body{user-select:none;-webkit-user-select:none}input,textarea{user-select:text;-webkit-user-select:text}button,input,textarea{font:inherit;color:inherit}button{border:0;background:none;cursor:pointer}.hidden{display:none!important}
.app{height:100dvh;padding-top:var(--safe-top);padding-bottom:var(--safe-bottom);display:grid;grid-template-columns:390px 1fr;background:var(--tg-bg)}
.sidebar{background:var(--tg-panel);border-right:1px solid var(--tg-line);min-width:0;display:flex;flex-direction:column;z-index:5}.main{min-width:0;display:flex;flex-direction:column;position:relative;overflow:hidden;background:var(--tg-bg)}
.topbar{height:56px;background:var(--tg-panel-2);display:flex;align-items:center;gap:10px;padding:7px 12px;flex:0 0 auto;box-shadow:0 1px 0 var(--tg-line);z-index:8}.iconBtn{width:42px;height:42px;border-radius:50%;display:grid;place-items:center;color:#b4c3d2;font-size:22px;flex:0 0 auto}.iconBtn:hover,.iconBtn:active{background:rgba(255,255,255,.07)}.hamb span{display:block;width:18px;height:2px;border-radius:3px;background:#b4c3d2;margin:3px}.head{min-width:0;flex:1}.title{font-size:17px;font-weight:700;line-height:21px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.subtitle{font-size:13px;color:var(--tg-muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:1px}.avatarSmall{width:40px;height:40px;border-radius:50%;display:grid;place-items:center;background:linear-gradient(135deg,#5fb3f3,#7664f6);font-weight:800;flex:0 0 auto}.back{display:none}.searchWrap{padding:8px 10px;background:var(--tg-panel);border-bottom:1px solid rgba(255,255,255,.035)}.searchBox{height:36px;border-radius:11px;background:var(--tg-panel-3);display:flex;align-items:center;gap:8px;color:var(--tg-muted);padding:0 12px}.searchBox input{width:100%;height:100%;border:0;outline:0;background:transparent;font-size:15px}.tabs{display:flex;gap:8px;background:var(--tg-panel);padding:0 10px 8px;border-bottom:1px solid rgba(255,255,255,.035)}.tabs button{height:34px;flex:1;border-radius:10px;color:var(--tg-muted);font-size:14px;font-weight:650}.tabs button.active{background:#263849;color:#fff}.list{flex:1;overflow:auto;-webkit-overflow-scrolling:touch}.chatItem{min-height:72px;padding:10px 12px;display:flex;align-items:center;gap:12px;position:relative}.chatItem:hover,.chatItem.active{background:#223142}.chatItem:after{content:"";position:absolute;left:74px;right:0;bottom:0;height:1px;background:rgba(255,255,255,.045)}.avatar{width:52px;height:52px;border-radius:50%;display:grid;place-items:center;color:#fff;font-size:22px;font-weight:850;flex:0 0 auto;background:linear-gradient(135deg,#69c0ff,#7367f0)}.avatar.folder{border-radius:17px;background:linear-gradient(135deg,#3aa76d,#3390ec)}.avatar.saved{background:linear-gradient(135deg,#ffb84d,#ff6b6b)}.avatar.searchA{background:linear-gradient(135deg,#8b9bad,#415161)}.itemBody{min-width:0;flex:1}.itemLine{display:flex;align-items:center;gap:8px}.itemName{min-width:0;flex:1;font-size:16px;font-weight:650;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.itemTime{font-size:12px;color:var(--tg-muted);flex:0 0 auto}.preview{font-size:14px;color:var(--tg-muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:4px}.badge{min-width:21px;height:21px;border-radius:999px;background:var(--tg-blue);display:inline-grid;place-items:center;padding:0 6px;font-size:12px;font-weight:800;color:white;margin-left:5px}.pinMini{color:#76d597;margin-right:4px}.muted{color:var(--tg-muted)}
.wall{position:absolute;inset:0;background-color:#0e1621;background-image:radial-gradient(rgba(255,255,255,.033) 1px,transparent 1.2px),linear-gradient(135deg,rgba(51,144,236,.09),transparent 44%,rgba(58,167,109,.06));background-size:22px 22px,100% 100%;z-index:0}.pinBar{min-height:42px;display:none;align-items:center;gap:10px;background:#1e2b38;border-bottom:1px solid var(--tg-line);padding:7px 14px;z-index:6}.pinBar.show{display:flex}.pinStripe{width:3px;height:28px;border-radius:5px;background:var(--tg-green)}.pinContent{min-width:0;flex:1}.pinTitle{font-size:13px;color:#8fe0b3;font-weight:800}.pinText{font-size:13px;color:#c7d4df;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.pinClose{color:#9aacbc;font-size:20px}.view{position:relative;z-index:1;flex:1;overflow:hidden;display:flex;flex-direction:column}.empty{height:100%;display:grid;place-items:center;text-align:center;color:var(--tg-muted);padding:28px}.emptyBox{background:rgba(19,31,43,.72);border:1px solid var(--tg-line);border-radius:20px;padding:20px 24px;box-shadow:0 10px 30px rgba(0,0,0,.18)}.empty h2{margin:0 0 8px;color:var(--tg-text)}.empty p{margin:0;line-height:1.45;max-width:390px}.topics{flex:1;overflow:auto;padding:18px}.topicHeader{max-width:900px;margin:0 auto 14px;display:flex;align-items:center;justify-content:space-between;gap:12px}.topicHeader h2{margin:0;font-size:22px}.topicHeader p{margin:4px 0 0;color:var(--tg-muted);font-size:14px}.primaryBtn{height:44px;border-radius:13px;background:var(--tg-blue);padding:0 16px;font-weight:800;color:#fff}.topicCards{max-width:900px;margin:0 auto;display:grid;grid-template-columns:repeat(auto-fill,minmax(245px,1fr));gap:12px}.topicCard{background:rgba(34,46,58,.94);border:1px solid var(--tg-line);border-radius:17px;min-height:82px;padding:14px;display:flex;align-items:center;gap:12px;box-shadow:0 8px 25px rgba(0,0,0,.14)}.topicCard:active{transform:scale(.99)}.topicCard .avatar{width:46px;height:46px;font-size:20px}.topicTitle{font-weight:800}.topicDesc{font-size:13px;color:var(--tg-muted);margin-top:4px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.topicMore{margin-left:auto;color:#aebdcc;font-size:22px}.messages{flex:1;overflow:auto;padding:14px 18px 10px;display:flex;flex-direction:column;gap:7px;-webkit-overflow-scrolling:touch}.dateSep{align-self:center;background:rgba(20,30,40,.78);backdrop-filter:blur(8px);color:#b9c7d4;border-radius:999px;padding:5px 11px;font-size:12px;margin:9px 0}.msg{align-self:flex-end;max-width:min(680px,82%);background:var(--bubble);border-radius:16px 16px 5px 16px;padding:8px 9px 5px 10px;box-shadow:0 3px 10px rgba(0,0,0,.16);white-space:pre-wrap;word-break:break-word;line-height:1.34;position:relative}.msg:after{content:"";position:absolute;right:-5px;bottom:0;border:8px solid transparent;border-bottom-color:var(--bubble);border-left-color:var(--bubble);transform:rotate(-10deg)}.msg.pinned{outline:2px solid rgba(70,190,115,.45)}.msg.selected{outline:2px solid rgba(255,209,102,.7)}.msgText{font-size:15.5px}.meta{display:flex;align-items:center;justify-content:flex-end;gap:5px;font-size:11px;color:#c4d2df;margin-top:3px;line-height:13px}.check{font-size:13px;color:#8ad5ff}.msg.system{align-self:center;background:rgba(20,30,40,.68);color:var(--tg-muted);border-radius:999px;font-size:13px}.msg.system:after{display:none}.att{margin-top:7px;border-radius:13px;overflow:hidden;background:rgba(0,0,0,.22)}.att img,.att video{display:block;max-width:100%;max-height:390px}.att audio{display:block;width:280px;max-width:100%;margin:8px}.fileAtt{display:flex;align-items:center;gap:11px;padding:10px 12px;color:#fff;text-decoration:none}.fileIcon{width:38px;height:38px;border-radius:10px;background:rgba(255,255,255,.12);display:grid;place-items:center;font-size:20px}.fileName{font-weight:700}.fileType{font-size:12px;color:#cbd6df;margin-top:2px}.composer{min-height:58px;background:var(--tg-panel-2);border-top:1px solid var(--tg-line);padding:7px 10px calc(7px + var(--safe-bottom));display:flex;align-items:flex-end;gap:8px;z-index:7}.composer textarea{height:42px;max-height:130px;resize:none;outline:0;border:0;flex:1;border-radius:18px;background:var(--tg-panel);color:var(--tg-text);padding:11px 14px;font-size:16px}.roundBtn{width:42px;height:42px;border-radius:50%;display:grid;place-items:center;background:var(--tg-panel);color:#a9b8c7;font-size:22px;flex:0 0 auto}.send{background:var(--tg-blue);color:white}.recording{background:#451f29!important;color:#ff8fa3!important;animation:pulse 1s infinite}@keyframes pulse{50%{transform:scale(1.06)}}.dropHint{position:absolute;left:12px;right:12px;bottom:70px;background:#223142;border:1px dashed #4b6f8d;border-radius:14px;padding:12px;text-align:center;color:#b9c7d4;display:none;z-index:10}.main.drag .dropHint{display:block}.attachMenu{position:absolute;left:10px;bottom:70px;background:#22303d;border:1px solid var(--tg-line);border-radius:14px;box-shadow:var(--shadow);overflow:hidden;z-index:20;display:none}.attachMenu.show{display:block}.attachMenu button{display:block;width:210px;height:44px;text-align:left;padding:0 14px;border-bottom:1px solid var(--tg-line)}.attachMenu button:last-child{border-bottom:0}.shade{position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:40;display:none;align-items:center;justify-content:center;padding:16px}.shade.show{display:flex}.modal{width:min(520px,100%);background:#1f2c38;border:1px solid var(--tg-line);border-radius:18px;box-shadow:var(--shadow);padding:18px}.modal h3{margin:0 0 14px;font-size:20px}.field{width:100%;height:44px;border:0;outline:0;border-radius:12px;background:var(--tg-panel);padding:0 13px;margin:0 0 10px}.textarea{height:120px;padding:12px 13px;resize:vertical}.row{display:flex;gap:8px}.actions{display:flex;gap:8px;margin-top:6px}.btn{flex:1;height:44px;border-radius:12px;background:#2a3a49;font-weight:800}.btn.primary{background:var(--tg-blue)}.btn.danger{background:rgba(239,91,91,.16);color:#ff9f9f}.ctx{position:fixed;z-index:50;display:none;min-width:248px;background:#22303d;border:1px solid var(--tg-line);border-radius:14px;box-shadow:var(--shadow);overflow:hidden}.ctx button{width:100%;height:46px;text-align:left;padding:0 16px;border-bottom:1px solid var(--tg-line);font-weight:600}.ctx button:last-child{border-bottom:0}.ctx button:active{background:rgba(255,255,255,.07)}.ctx .danger{color:#ff9f9f}.drawer{position:fixed;left:0;top:0;bottom:0;width:min(330px,84vw);background:var(--tg-panel);z-index:60;transform:translateX(-105%);transition:.22s ease;box-shadow:var(--shadow);padding:calc(16px + var(--safe-top)) 14px 14px}.drawer.show{transform:translateX(0)}.drawer h2{margin:0 0 8px}.drawer p{color:var(--tg-muted);line-height:1.35}.drawerBtn{width:100%;height:44px;border-radius:12px;background:#223142;text-align:left;padding:0 13px;margin-top:8px}.toast{position:fixed;left:50%;bottom:calc(24px + var(--safe-bottom));transform:translateX(-50%);background:rgba(0,0,0,.75);color:#fff;padding:10px 14px;border-radius:999px;z-index:80;display:none;font-size:14px}.toast.show{display:block}.fab{position:absolute;right:22px;bottom:22px;width:56px;height:56px;border-radius:50%;background:var(--tg-blue);color:#fff;font-size:28px;display:none;place-items:center;box-shadow:0 10px 30px rgba(0,0,0,.35);z-index:7}
@media(max-width:860px){.app{display:block}.sidebar,.main{position:absolute;inset:var(--safe-top) 0 var(--safe-bottom) 0}.main{transform:translateX(100%);transition:.23s ease;z-index:8}.app.open .main{transform:translateX(0)}.back{display:grid}.topbar{height:54px}.chatItem{min-height:70px}.messages{padding-left:10px;padding-right:10px}.msg{max-width:88%}.topics{padding:14px 10px}.topicCards{grid-template-columns:1fr}.shade{align-items:flex-end;padding:8px}.modal{border-radius:18px 18px 14px 14px}.fab{display:grid}.topicHeader .primaryBtn{display:none}}
</style>
</head>
<body>
<div class="app" id="app">
  <aside class="sidebar">
    <div class="topbar"><button class="iconBtn hamb" id="menuBtn"><span></span><span></span><span></span></button><div class="head"><div class="title">Заметки</div><div class="subtitle">Личный Telegram</div></div><button class="iconBtn" id="newGroupBtn">＋</button></div>
    <div class="searchWrap"><label class="searchBox">⌕<input id="searchInput" placeholder="Поиск" autocomplete="off"></label></div>
    <div class="tabs"><button id="tabGroups" class="active">Группы</button><button id="tabPins">Закрепы</button><button id="tabAll">Все</button></div>
    <div class="list" id="leftList"></div>
  </aside>
  <main class="main" id="main">
    <div class="wall"></div>
    <div class="topbar" id="mainTop"><button class="iconBtn back" id="backBtn">‹</button><div class="avatarSmall" id="chatAvatar">TG</div><div class="head"><div class="title" id="mainTitle">Выбери группу</div><div class="subtitle" id="mainSub">или создай новую</div></div><button class="iconBtn" id="searchInChatBtn">⌕</button><button class="iconBtn" id="moreBtn">⋯</button></div>
    <div class="pinBar" id="pinBar"><div class="pinStripe"></div><div class="pinContent"><div class="pinTitle">Закрепленное сообщение</div><div class="pinText" id="pinText"></div></div><button class="pinClose" id="pinClose">×</button></div>
    <section class="view" id="view"></section>
    <div class="dropHint">Отпусти файл — добавлю его сообщением</div>
    <div class="attachMenu" id="attachMenu"><button data-accept="image/*,video/*">🖼 Фото/Видео</button><button data-accept="image/*" data-capture="environment">📷 Камера</button><button data-accept="audio/*">🎵 Аудио</button><button data-accept="*/*">📎 Файл</button></div>
    <button class="fab" id="fab">＋</button>
  </main>
</div>
<input id="fileInput" type="file" class="hidden" multiple>
<div class="shade" id="shade"><div class="modal"><h3 id="modalTitle">Создать</h3><input class="field" id="modalName" placeholder="Название"><textarea class="field textarea" id="modalDesc" placeholder="Описание"></textarea><div class="actions"><button class="btn" id="modalCancel">Отмена</button><button class="btn danger hidden" id="modalDelete">Удалить</button><button class="btn primary" id="modalSave">Сохранить</button></div></div></div>
<div class="ctx" id="ctx"></div>
<div class="drawer" id="drawer"><h2>Личный Telegram</h2><p>Все хранится в этом браузере. Это не мессенджер: группы, темы и сообщения нужны только для твоих заметок.</p><button class="drawerBtn" id="exportBtn">⬇ Экспорт JSON</button><button class="drawerBtn" id="importBtn">⬆ Импорт JSON</button><button class="drawerBtn" id="clearBtn">🗑 Очистить всё</button></div>
<div class="toast" id="toast"></div>
<script>
(function(){
'use strict';
const $=id=>document.getElementById(id);const app=$('app'),view=$('view'),leftList=$('leftList'),toast=$('toast'),ctx=$('ctx'),shade=$('shade');
const key='personal_telegram_notes_v3';
const now=()=>Date.now();const uid=()=>Math.random().toString(36).slice(2,10)+Date.now().toString(36).slice(-5);
const esc=s=>(s||'').replace(/[&<>"]/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[m]));
const fmt=t=>{const d=new Date(t),n=new Date(); if(d.toDateString()===n.toDateString())return d.toLocaleTimeString('ru-RU',{hour:'2-digit',minute:'2-digit'}); return d.toLocaleDateString('ru-RU',{day:'2-digit',month:'2-digit'});};
const day=t=>new Date(t).toLocaleDateString('ru-RU',{day:'numeric',month:'long'});
let state=load();let currentGroup=state.groups[0]?.id||null,currentTopic=null,mode='groups',query='',modal=null,context=null,rec=null,mediaChunks=[];
function seed(){return{groups:[{id:uid(),name:'Идеи для мероприятий',desc:'Конкурсы, шутки, музыка, реквизит',created:now(),updated:now(),archived:false,topics:[{id:uid(),name:'Конкурсы',desc:'Все идеи игр и интерактивов',created:now(),updated:now(),messages:[{id:uid(),text:'Пример заметки: сюда можно писать как в чат Telegram. Долгий тап / правая кнопка — действия.',created:now(),updated:now(),pinned:true,attachments:[]}]}]},{id:uid(),name:'Контент',desc:'VK, Shorts, идеи роликов',created:now()-900000,updated:now()-500000,archived:false,topics:[{id:uid(),name:'Идеи роликов',desc:'Черновики',created:now()-900000,updated:now()-500000,messages:[]}]}]}}
function load(){try{return JSON.parse(localStorage.getItem(key))||seed()}catch(e){return seed()}}
function save(){localStorage.setItem(key,JSON.stringify(state))}
function notice(s){toast.textContent=s;toast.classList.add('show');setTimeout(()=>toast.classList.remove('show'),1500)}
function group(id=currentGroup){return state.groups.find(g=>g.id===id)}function topic(id=currentTopic,g=group()){return g?.topics.find(t=>t.id===id)}
function touch(g,t){if(t)t.updated=now(); if(g)g.updated=now(); save();}
function lastMsg(g){let arr=[];g.topics.forEach(t=>t.messages.forEach(m=>arr.push({...m,topic:t.name})));arr.sort((a,b)=>b.created-a.created);return arr[0]}
function initials(s){return (s||'?').trim().split(/\s+/).slice(0,2).map(x=>x[0]).join('').toUpperCase()||'?'}
function render(){renderLeft();renderMain();}
function renderLeft(){let html='';let q=query.toLowerCase().trim();let items=[];
 if(mode==='groups'){items=state.groups.filter(g=>!q||g.name.toLowerCase().includes(q)||g.desc.toLowerCase().includes(q));}
 if(mode==='pins'){state.groups.forEach(g=>g.topics.forEach(t=>t.messages.filter(m=>m.pinned).forEach(m=>items.push({g,t,m}))));}
 if(mode==='all'){state.groups.forEach(g=>g.topics.forEach(t=>t.messages.forEach(m=>{if(!q||m.text.toLowerCase().includes(q)||g.name.toLowerCase().includes(q)||t.name.toLowerCase().includes(q))items.push({g,t,m})})));items.sort((a,b)=>b.m.created-a.m.created)}
 if(mode==='groups') html=items.map(g=>{let lm=lastMsg(g);return `<div class="chatItem ${g.id===currentGroup?'active':''}" data-open-group="${g.id}" data-kind="group"><div class="avatar">${esc(initials(g.name))}</div><div class="itemBody"><div class="itemLine"><div class="itemName">${esc(g.name)}</div><div class="itemTime">${lm?fmt(lm.created):fmt(g.updated)}</div></div><div class="preview">${lm?(lm.pinned?'<span class="pinMini">⌖</span>':'')+esc(lm.text||('[вложение]')):esc(g.desc||'Нет сообщений')}</div></div></div>`}).join('');
 else html=items.map(x=>`<div class="chatItem" data-open-msg="${x.g.id}|${x.t.id}|${x.m.id}"><div class="avatar ${mode==='pins'?'saved':'searchA'}">${mode==='pins'?'⌖':'⌕'}</div><div class="itemBody"><div class="itemLine"><div class="itemName">${esc(x.g.name)} › ${esc(x.t.name)}</div><div class="itemTime">${fmt(x.m.created)}</div></div><div class="preview">${esc(x.m.text||'[вложение]')}</div></div></div>`).join('');
 leftList.innerHTML=html||`<div class="empty"><div class="emptyBox"><h2>Ничего нет</h2><p>Создай группу или измени поиск.</p></div></div>`;
}
function renderMain(){const g=group();$('mainTitle').textContent=g?g.name:'Выбери группу';$('mainSub').textContent=g?(currentTopic?topic()?.name||'Тема':'тем: '+g.topics.length):'или создай новую';$('chatAvatar').textContent=g?initials(g.name):'TG';renderPin(); if(!g){view.innerHTML='<div class="empty"><div class="emptyBox"><h2>Личный Telegram</h2><p>Создавай группы, подтемы и сообщения как в Telegram, но только для заметок.</p></div></div>';return}
 if(!currentTopic){view.innerHTML=`<div class="topics"><div class="topicHeader"><div><h2>Темы</h2><p>${esc(g.desc||'Выбери тему или создай новую')}</p></div><button class="primaryBtn" id="addTopicBtn">＋ Новая тема</button></div><div class="topicCards">${g.topics.map(t=>`<div class="topicCard" data-open-topic="${t.id}"><div class="avatar folder">#</div><div class="itemBody"><div class="topicTitle">${esc(t.name)}</div><div class="topicDesc">${t.messages.length} сообщений · ${esc(t.desc||'Без описания')}</div></div><button class="topicMore" data-topic-menu="${t.id}">⋯</button></div>`).join('')}</div></div>`;return}
 const t=topic(); if(!t){currentTopic=null;render();return} let prevDay=''; let msgs=t.messages.slice().sort((a,b)=>a.created-b.created).map(m=>{let ds=day(m.created),sep=ds!==prevDay?`<div class="dateSep">${esc(ds)}</div>`:'';prevDay=ds;return sep+messageHtml(m)}).join('');
 view.innerHTML=`<div class="messages" id="messages">${msgs||'<div class="msg system">Пока пусто. Напиши первую заметку.</div>'}</div><div class="composer"><button class="roundBtn" id="attachBtn">＋</button><textarea id="composerText" placeholder="Сообщение" rows="1"></textarea><button class="roundBtn" id="micBtn">🎤</button><button class="roundBtn send" id="sendBtn">➤</button></div>`;setTimeout(()=>{$('messages')?.scrollTo(0,999999)},0)
}
function messageHtml(m){let at=(m.attachments||[]).map(a=>attachmentHtml(a)).join('');return `<div class="msg ${m.pinned?'pinned':''}" data-msg="${m.id}">${at}${m.text?`<div class="msgText">${esc(m.text)}</div>`:''}<div class="meta"><span>${fmt(m.created)}</span><span class="check">✓✓</span></div></div>`}
function attachmentHtml(a){if(a.type.startsWith('image/'))return `<div class="att"><img src="${a.data}" alt=""></div>`;if(a.type.startsWith('video/'))return `<div class="att"><video src="${a.data}" controls></video></div>`;if(a.type.startsWith('audio/'))return `<div class="att"><audio src="${a.data}" controls></audio></div>`;return `<div class="att"><a class="fileAtt" href="${a.data}" download="${esc(a.name)}"><div class="fileIcon">📎</div><div><div class="fileName">${esc(a.name)}</div><div class="fileType">${esc(a.type||'файл')}</div></div></a></div>`}
function renderPin(){const g=group(),t=topic();let pins=t?.messages.filter(m=>m.pinned)||[];$('pinBar').classList.toggle('show',!!pins.length);$('pinText').textContent=pins[0]?.text||pins[0]?.attachments?.[0]?.name||''}
function openGroup(id){currentGroup=id;currentTopic=null;app.classList.add('open');render()} function openTopic(id){currentTopic=id;app.classList.add('open');render()} function openMsg(gid,tid,mid){currentGroup=gid;currentTopic=tid;app.classList.add('open');render();setTimeout(()=>{let el=document.querySelector(`[data-msg="${mid}"]`);if(el){el.scrollIntoView({block:'center'});el.classList.add('selected');setTimeout(()=>el.classList.remove('selected'),1300)}},80)}
function send(text,atts=[]){const g=group(),t=topic();if(!g||!t)return; text=(text||'').trim(); if(!text&&!atts.length)return; t.messages.push({id:uid(),text,created:now(),updated:now(),pinned:false,attachments:atts});touch(g,t);render();}
function openModal(type,obj){modal={type,obj};$('modalTitle').textContent=type==='group'?(obj?'Редактировать группу':'Новая группа'):(obj?'Редактировать тему':'Новая тема');$('modalName').value=obj?.name||'';$('modalDesc').value=obj?.desc||'';$('modalDelete').classList.toggle('hidden',!obj);shade.classList.add('show');setTimeout(()=>$('modalName').focus(),50)}
function closeModal(){shade.classList.remove('show');modal=null}
function saveModal(){let name=$('modalName').value.trim(),desc=$('modalDesc').value.trim();if(!name)return notice('Введи название'); if(modal.type==='group'){if(modal.obj){modal.obj.name=name;modal.obj.desc=desc;modal.obj.updated=now()}else{let g={id:uid(),name,desc,created:now(),updated:now(),archived:false,topics:[]};state.groups.unshift(g);currentGroup=g.id;currentTopic=null}}else{let g=group();if(!g)return;if(modal.obj){modal.obj.name=name;modal.obj.desc=desc;modal.obj.updated=now()}else{let t={id:uid(),name,desc,created:now(),updated:now(),messages:[]};g.topics.unshift(t);currentTopic=t.id}g.updated=now()} save();closeModal();render()}
function deleteModal(){if(!modal?.obj)return; if(modal.type==='group'){state.groups=state.groups.filter(g=>g!==modal.obj);currentGroup=state.groups[0]?.id||null;currentTopic=null}else{let g=group();g.topics=g.topics.filter(t=>t!==modal.obj);currentTopic=null;g.updated=now()}save();closeModal();render()}
function showCtx(x,y,buttons){ctx.innerHTML=buttons.map(b=>`<button class="${b.danger?'danger':''}" data-act="${b.act}">${b.text}</button>`).join('');ctx.style.display='block';ctx.style.left=Math.min(x,innerWidth-260)+'px';ctx.style.top=Math.min(y,innerHeight-buttons.length*46-20)+'px'}function hideCtx(){ctx.style.display='none';context=null}
async function filesToAtts(files){let arr=[];for(const f of files){arr.push(await new Promise(res=>{let r=new FileReader();r.onload=()=>res({id:uid(),name:f.name,type:f.type||'application/octet-stream',data:r.result,size:f.size});r.readAsDataURL(f)}))}return arr}
async function handleFiles(files){let atts=await filesToAtts(Array.from(files));send('',atts)}
function setTab(m){mode=m;document.querySelectorAll('.tabs button').forEach(b=>b.classList.remove('active'));$('tab'+(m==='groups'?'Groups':m==='pins'?'Pins':'All')).classList.add('active');renderLeft()}
leftList.onclick=e=>{let a=e.target.closest('[data-open-group]');if(a)openGroup(a.dataset.openGroup);let m=e.target.closest('[data-open-msg]');if(m){let [g,t,id]=m.dataset.openMsg.split('|');openMsg(g,t,id)}};
view.onclick=e=>{let ot=e.target.closest('[data-open-topic]');if(ot&&!e.target.closest('[data-topic-menu]'))openTopic(ot.dataset.openTopic);let tm=e.target.closest('[data-topic-menu]');if(tm){e.stopPropagation();context={type:'topic',id:tm.dataset.topicMenu};showCtx(e.clientX,e.clientY,[{act:'editTopic',text:'✏️ Редактировать тему'},{act:'deleteTopic',text:'🗑 Удалить тему',danger:true}])}if(e.target.id==='addTopicBtn')openModal('topic',null);if(e.target.id==='sendBtn')send($('composerText').value);if(e.target.id==='attachBtn')$('attachMenu').classList.toggle('show');if(e.target.closest('#attachMenu button')){let b=e.target.closest('button'),inp=$('fileInput');inp.accept=b.dataset.accept;inp.capture=b.dataset.capture||'';inp.click();$('attachMenu').classList.remove('show')}if(e.target.id==='micBtn')toggleRec(e.target)};
view.oninput=e=>{if(e.target.id==='composerText'){e.target.style.height='42px';e.target.style.height=Math.min(e.target.scrollHeight,130)+'px'}};
view.oncontextmenu=e=>{let m=e.target.closest('[data-msg]');if(m){e.preventDefault();context={type:'msg',id:m.dataset.msg};let mm=topic()?.messages.find(x=>x.id===context.id);showCtx(e.clientX,e.clientY,[{act:'pinMsg',text:mm?.pinned?'📌 Открепить':'📌 Закрепить'},{act:'editMsg',text:'✏️ Редактировать'},{act:'copyMsg',text:'📋 Копировать'},{act:'deleteMsg',text:'🗑 Удалить',danger:true}])}};
let pressTimer=null;view.addEventListener('touchstart',e=>{let m=e.target.closest('[data-msg]');if(m)pressTimer=setTimeout(()=>{context={type:'msg',id:m.dataset.msg};showCtx(e.touches[0].clientX,e.touches[0].clientY,[{act:'pinMsg',text:'📌 Закрепить / открепить'},{act:'editMsg',text:'✏️ Редактировать'},{act:'copyMsg',text:'📋 Копировать'},{act:'deleteMsg',text:'🗑 Удалить',danger:true}])},520)},{passive:true});view.addEventListener('touchend',()=>clearTimeout(pressTimer));
ctx.onclick=e=>{let act=e.target.dataset.act;if(!act)return;const g=group(),t=topic();if(act==='editTopic')openModal('topic',g.topics.find(x=>x.id===context.id));if(act==='deleteTopic'){g.topics=g.topics.filter(x=>x.id!==context.id);currentTopic=null;touch(g)}if(context?.type==='msg'){let m=t.messages.find(x=>x.id===context.id);if(act==='pinMsg'){m.pinned=!m.pinned;touch(g,t)}if(act==='copyMsg'){navigator.clipboard?.writeText(m.text||'');notice('Скопировано')}if(act==='deleteMsg'){t.messages=t.messages.filter(x=>x.id!==m.id);touch(g,t)}if(act==='editMsg'){let txt=prompt('Редактировать сообщение',m.text||'');if(txt!==null){m.text=txt;m.updated=now();touch(g,t)}}}hideCtx();render()};document.addEventListener('click',e=>{if(!e.target.closest('.ctx'))hideCtx();if(!e.target.closest('#attachMenu')&&!e.target.closest('#attachBtn'))$('attachMenu').classList.remove('show')});
$('newGroupBtn').onclick=()=>openModal('group',null);$('fab').onclick=()=>currentTopic?$('composerText')?.focus():openModal(currentGroup?'topic':'group',null);$('backBtn').onclick=()=>{if(currentTopic){currentTopic=null;render()}else app.classList.remove('open')};$('moreBtn').onclick=e=>{let g=group();if(!g)return;context={type:'group'};showCtx(e.clientX,e.clientY,[{act:'editGroup',text:'✏️ Редактировать группу'},{act:'newTopic',text:'＋ Новая тема'},{act:'deleteGroup',text:'🗑 Удалить группу',danger:true}])};
$('ctx').addEventListener('click',e=>{let act=e.target.dataset.act;if(!act)return;let g=group();if(act==='editGroup')openModal('group',g);if(act==='newTopic')openModal('topic',null);if(act==='deleteGroup'){state.groups=state.groups.filter(x=>x.id!==g.id);currentGroup=state.groups[0]?.id||null;currentTopic=null;save();render()}hideCtx()});
$('modalCancel').onclick=closeModal;$('modalSave').onclick=saveModal;$('modalDelete').onclick=deleteModal;shade.onclick=e=>{if(e.target===shade)closeModal()};$('searchInput').oninput=e=>{query=e.target.value;renderLeft()};$('tabGroups').onclick=()=>setTab('groups');$('tabPins').onclick=()=>setTab('pins');$('tabAll').onclick=()=>setTab('all');$('pinClose').onclick=()=>{$('pinBar').classList.remove('show')};$('searchInChatBtn').onclick=()=>{$('searchInput').focus();setTab('all')};$('menuBtn').onclick=()=>$('drawer').classList.add('show');document.addEventListener('click',e=>{if(!e.target.closest('#drawer')&&!e.target.closest('#menuBtn'))$('drawer').classList.remove('show')});
$('fileInput').onchange=e=>{handleFiles(e.target.files);e.target.value=''};['dragenter','dragover'].forEach(ev=>$('main').addEventListener(ev,e=>{e.preventDefault();$('main').classList.add('drag')}));['dragleave','drop'].forEach(ev=>$('main').addEventListener(ev,e=>{e.preventDefault();$('main').classList.remove('drag')}));$('main').addEventListener('drop',e=>{if(e.dataTransfer.files.length)handleFiles(e.dataTransfer.files)});
async function toggleRec(btn){if(rec){rec.stop();btn.classList.remove('recording');notice('Голосовая сохранена');return}try{let stream=await navigator.mediaDevices.getUserMedia({audio:true});mediaChunks=[];rec=new MediaRecorder(stream);rec.ondataavailable=e=>mediaChunks.push(e.data);rec.onstop=()=>{let blob=new Blob(mediaChunks,{type:'audio/webm'});let f=new File([blob],'voice.webm',{type:'audio/webm'});handleFiles([f]);stream.getTracks().forEach(t=>t.stop());rec=null};rec.start();btn.classList.add('recording');notice('Запись началась')}catch(e){notice('Микрофон недоступен')}}
$('exportBtn').onclick=()=>{let a=document.createElement('a');a.href=URL.createObjectURL(new Blob([JSON.stringify(state,null,2)],{type:'application/json'}));a.download='telegram-notes-backup.json';a.click();URL.revokeObjectURL(a.href)};$('importBtn').onclick=()=>{let inp=document.createElement('input');inp.type='file';inp.accept='application/json';inp.onchange=()=>{let r=new FileReader();r.onload=()=>{try{state=JSON.parse(r.result);save();currentGroup=state.groups[0]?.id||null;currentTopic=null;render();notice('Импортировано')}catch(e){notice('Ошибка импорта')}};r.readAsText(inp.files[0])};inp.click()};$('clearBtn').onclick=()=>{if(confirm('Удалить все заметки?')){state={groups:[]};save();currentGroup=null;currentTopic=null;render();notice('Очищено')}};
render();window.__notesTest={state,send,openGroup,openTopic,render};
})();
