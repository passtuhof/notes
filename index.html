<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Заметки</title>
  <style>
    :root{
      --tg-bg:#0f1720;
      --tg-panel:#17212b;
      --tg-panel2:#202b36;
      --tg-blue:#2aabee;
      --tg-blue2:#1f8fc7;
      --tg-text:#eef6ff;
      --tg-muted:#8fa3b5;
      --tg-line:rgba(255,255,255,.08);
      --bubble:#243447;
      --bubble-own:#2b5278;
      --danger:#ff5b6e;
      --safe:#4bd37b;
      --shadow:0 12px 30px rgba(0,0,0,.25);
    }
    *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
    html,body{margin:0;height:100%;background:var(--tg-bg);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;color:var(--tg-text);overflow:hidden}
    button,input,textarea{font-family:inherit}
    .app{height:100dvh;display:flex;justify-content:center;background:
      radial-gradient(circle at top left, rgba(42,171,238,.13), transparent 38%),
      radial-gradient(circle at bottom right, rgba(75,211,123,.08), transparent 35%),
      var(--tg-bg)}
    .phone{width:100%;max-width:820px;height:100%;background:var(--tg-panel);display:flex;flex-direction:column;box-shadow:var(--shadow);position:relative}
    .topbar{height:58px;min-height:58px;background:var(--tg-panel2);display:flex;align-items:center;gap:10px;padding:0 14px;border-bottom:1px solid var(--line)}
    .back{width:38px;height:38px;border:0;background:transparent;color:var(--tg-text);font-size:28px;border-radius:50%;display:none;align-items:center;justify-content:center}
    .back:active,.iconBtn:active,.fab:active,.send:active{transform:scale(.96)}
    .titleWrap{min-width:0;flex:1}
    .title{font-size:20px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .subtitle{font-size:12px;color:var(--tg-muted);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .search{padding:10px 12px;background:var(--tg-panel)}
    .search input{width:100%;height:40px;border:0;border-radius:12px;background:#101923;color:var(--tg-text);padding:0 14px;font-size:15px;outline:none}
    .content{flex:1;overflow:auto;padding-bottom:86px;scroll-behavior:smooth}
    .listItem{display:flex;align-items:center;gap:12px;padding:12px 14px;border-bottom:1px solid var(--line);cursor:pointer;user-select:none}
    .listItem:active{background:rgba(255,255,255,.05)}
    .avatar{width:48px;height:48px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:23px;font-weight:700;flex:none;background:linear-gradient(135deg,#2aabee,#41d392)}
    .avatar.folder{background:linear-gradient(135deg,#ffb74d,#ff7043)}
    .avatar.subfolder{background:linear-gradient(135deg,#ab7cff,#536dfe)}
    .itemMain{min-width:0;flex:1}
    .itemTop{display:flex;gap:10px;align-items:center}
    .itemName{font-weight:650;font-size:16px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex:1}
    .itemTime{font-size:12px;color:var(--tg-muted);white-space:nowrap}
    .itemSub{margin-top:4px;color:var(--tg-muted);font-size:14px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .itemActions{display:flex;gap:6px}
    .smallBtn{border:0;background:rgba(255,255,255,.07);color:var(--tg-muted);border-radius:9px;padding:7px 9px;font-size:14px}
    .smallBtn.danger{color:#ffb4bf}
    .fab{position:absolute;right:18px;bottom:20px;width:58px;height:58px;border-radius:50%;background:var(--tg-blue);border:0;color:white;font-size:30px;box-shadow:0 10px 22px rgba(42,171,238,.35);z-index:10}
    .composer{display:none;position:absolute;left:0;right:0;bottom:0;background:var(--tg-panel2);border-top:1px solid var(--line);padding:8px 8px calc(8px + env(safe-area-inset-bottom));gap:7px;align-items:flex-end}
    .attach{width:42px;height:42px;border:0;border-radius:50%;background:transparent;color:var(--tg-muted);font-size:26px;flex:none}
    .msgInput{flex:1;min-height:42px;max-height:120px;resize:none;border:0;outline:none;border-radius:18px;background:#101923;color:var(--tg-text);padding:11px 14px;font-size:16px;line-height:20px}
    .send{width:42px;height:42px;border-radius:50%;border:0;background:var(--tg-blue);color:white;font-size:20px;flex:none}
    .messages{padding:14px 10px 98px;background:
      linear-gradient(rgba(15,23,32,.88),rgba(15,23,32,.88)),
      radial-gradient(circle at 20% 10%, rgba(42,171,238,.18), transparent 25%),
      radial-gradient(circle at 80% 80%, rgba(75,211,123,.10), transparent 28%)}
    .dayLabel{display:table;margin:8px auto 14px;padding:5px 11px;background:rgba(0,0,0,.25);color:var(--tg-muted);font-size:12px;border-radius:999px}
    .bubble{max-width:82%;margin:7px 0 7px auto;background:var(--bubble-own);border-radius:16px 16px 4px 16px;padding:9px 10px;box-shadow:0 2px 8px rgba(0,0,0,.14);word-wrap:break-word;white-space:pre-wrap}
    .bubble.file{background:var(--bubble)}
    .bubble img,.bubble video{max-width:100%;border-radius:12px;display:block;margin-bottom:6px}
    .bubble audio{width:100%;max-width:320px}
    .meta{display:block;text-align:right;color:rgba(255,255,255,.62);font-size:11px;margin-top:4px}
    .fileBox{display:flex;align-items:center;gap:10px}
    .fileIcon{width:38px;height:38px;border-radius:10px;background:rgba(255,255,255,.13);display:flex;align-items:center;justify-content:center;font-size:22px}
    .fileName{font-weight:650;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
    .fileSize{font-size:12px;color:var(--muted)}
    .sheet{position:absolute;left:10px;right:10px;bottom:86px;background:#1d2935;border:1px solid var(--line);border-radius:20px;padding:10px;display:none;box-shadow:var(--shadow);z-index:20}
    .sheetGrid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
    .sheetBtn{border:0;border-radius:15px;background:rgba(255,255,255,.07);color:var(--tg-text);padding:12px 8px;font-size:13px;min-height:72px}
    .sheetBtn span{display:block;font-size:25px;margin-bottom:6px}
    .modalBg{position:absolute;inset:0;background:rgba(0,0,0,.48);display:none;align-items:flex-end;z-index:50}
    .modal{width:100%;background:#1d2935;border-radius:22px 22px 0 0;padding:18px 14px calc(18px + env(safe-area-inset-bottom));box-shadow:var(--shadow)}
    .modal h3{margin:0 0 12px;font-size:20px}
    .modal input{width:100%;height:46px;border:1px solid var(--line);border-radius:14px;background:#101923;color:var(--tg-text);padding:0 14px;font-size:16px;outline:none}
    .modalRow{display:flex;gap:8px;margin-top:12px}
    .modalBtn{flex:1;border:0;border-radius:14px;height:46px;color:white;font-size:16px;background:rgba(255,255,255,.12)}
    .modalBtn.primary{background:var(--tg-blue)}
    .choiceRow{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:10px}
    .empty{padding:50px 20px;text-align:center;color:var(--tg-muted)}
    .emptyIcon{font-size:52px;margin-bottom:12px}
    .hiddenInput{display:none}
    .recording{position:absolute;left:12px;right:12px;bottom:86px;background:#301c24;border:1px solid rgba(255,91,110,.35);border-radius:18px;padding:12px;display:none;z-index:25}
    .recRow{display:flex;align-items:center;gap:10px}
    .recDot{width:12px;height:12px;background:var(--danger);border-radius:50%;animation:pulse 1s infinite}
    .recText{flex:1}
    .recStop{border:0;border-radius:12px;background:var(--danger);color:white;padding:10px 14px}
    @keyframes pulse{50%{opacity:.35}}
    @media(min-width:821px){
      .phone{height:96dvh;margin:auto;border-radius:18px;overflow:hidden}
      .modalBg{border-radius:18px}
    }
  </style>
</head>
<body>
<div class="app">
  <div class="phone">
    <div class="topbar">
      <button class="back" id="backBtn">‹</button>
      <div class="titleWrap">
        <div class="title" id="screenTitle">Заметки</div>
        <div class="subtitle" id="screenSub">Быстрые заметки в стиле Telegram</div>
      </div>
      <button class="smallBtn" id="homeBtn" title="Домой">⌂</button>
    </div>

    <div class="search" id="searchWrap">
      <input id="searchInput" placeholder="Поиск" />
    </div>

    <div class="content" id="content"></div>

    <button class="fab" id="fab">+</button>

    <div class="composer" id="composer">
      <button class="attach" id="attachBtn">＋</button>
      <textarea class="msgInput" id="msgInput" rows="1" placeholder="Сообщение"></textarea>
      <button class="send" id="sendBtn">➤</button>
    </div>

    <div class="sheet" id="attachSheet">
      <div class="sheetGrid">
        <button class="sheetBtn" data-action="photo"><span>🖼️</span>Фото</button>
        <button class="sheetBtn" data-action="cameraPhoto"><span>📷</span>Снять фото</button>
        <button class="sheetBtn" data-action="cameraVideo"><span>🎥</span>Снять видео</button>
        <button class="sheetBtn" data-action="video"><span>🎬</span>Видео</button>
        <button class="sheetBtn" data-action="circle"><span>⭕</span>Кружок</button>
        <button class="sheetBtn" data-action="file"><span>📎</span>Файл</button>
        <button class="sheetBtn" data-action="audio"><span>🎙️</span>Аудио</button>
      </div>
    </div>

    <div class="recording" id="recordingBox">
      <div class="recRow">
        <div class="recDot"></div>
        <div class="recText" id="recText">Идет запись аудио...</div>
        <button class="recStop" id="recStop">Стоп</button>
      </div>
    </div>

    <input class="hiddenInput" id="fileInput" type="file" />
    <input class="hiddenInput" id="photoInput" type="file" accept="image/*" />
    <input class="hiddenInput" id="cameraPhotoInput" type="file" accept="image/*" capture="environment" />
    <input class="hiddenInput" id="videoInput" type="file" accept="video/*" />
    <input class="hiddenInput" id="cameraVideoInput" type="file" accept="video/*" capture="environment" />

    <div class="modalBg" id="modalBg">
      <div class="modal">
        <h3 id="modalTitle">Создать</h3>
        <input id="nameInput" placeholder="Название" />
        <div class="choiceRow" id="choiceRow"></div>
        <div class="modalRow">
          <button class="modalBtn" id="cancelBtn">Отмена</button>
          <button class="modalBtn primary" id="createBtn">Создать</button>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
(() => {
  const KEY = 'telegram_notes_v1';
  const $ = id => document.getElementById(id);

  let db = load();
  let route = { type:'root', id:null };
  let createType = 'note';
  let mediaRecorder = null;
  let audioChunks = [];

  function load(){
    try { return JSON.parse(localStorage.getItem(KEY)) || seed(); }
    catch(e){ return seed(); }
  }
  function seed(){
    return { items: [], messages: {} };
  }
  function save(){
    localStorage.setItem(KEY, JSON.stringify(db));
  }
  function uid(){ return Date.now().toString(36) + Math.random().toString(36).slice(2,8); }
  function now(){ return new Date().toISOString(); }
  function timeShort(iso){
    const d = new Date(iso || Date.now());
    return d.toLocaleTimeString('ru-RU',{hour:'2-digit',minute:'2-digit'});
  }
  function dateLabel(){
    return new Date().toLocaleDateString('ru-RU',{day:'numeric',month:'long'});
  }
  function currentParentId(){ return route.type === 'folder' ? route.id : null; }
  function currentItem(){ return db.items.find(x => x.id === route.id); }
  function parentOf(item){ return item ? item.parentId || null : null; }
  function children(parentId){
    const q = $('searchInput').value.trim().toLowerCase();
    return db.items
      .filter(x => (x.parentId || null) === (parentId || null))
      .filter(x => !q || x.name.toLowerCase().includes(q) || (x.last || '').toLowerCase().includes(q))
      .sort((a,b)=> new Date(b.updatedAt) - new Date(a.updatedAt));
  }
  function getDepth(parentId){
    if(!parentId) return 0;
    const p = db.items.find(x => x.id === parentId);
    return p ? (p.depth || 0) + 1 : 0;
  }
  function canCreateFolder(){
    if(route.type === 'root') return true;
    const item = currentItem();
    return route.type === 'folder' && (item?.depth || 0) < 1;
  }

  function render(){
    const title = $('screenTitle'), sub = $('screenSub'), content = $('content');
    $('backBtn').style.display = route.type === 'root' ? 'none' : 'flex';
    $('composer').style.display = route.type === 'note' ? 'flex' : 'none';
    $('fab').style.display = route.type === 'note' ? 'none' : 'block';
    $('searchWrap').style.display = route.type === 'note' ? 'none' : 'block';
    $('attachSheet').style.display = 'none';

    if(route.type === 'root'){
      title.textContent = 'Заметки';
      sub.textContent = 'Папки и заметки';
      renderList(null);
    } else if(route.type === 'folder'){
      const item = currentItem();
      title.textContent = item?.name || 'Папка';
      sub.textContent = canCreateFolder() ? 'Можно создать заметку или подпапку' : 'Можно создать только заметку';
      renderList(route.id);
    } else {
      const item = currentItem();
      title.textContent = item?.name || 'Заметка';
      sub.textContent = 'Чат с самим собой';
      renderMessages();
    }
  }

  function renderList(parentId){
    const content = $('content');
    const list = children(parentId);
    if(!list.length){
      content.innerHTML = `<div class="empty"><div class="emptyIcon">💬</div><div>Пока пусто</div><br><div>Нажми +, чтобы быстро создать заметку${canCreateFolder() ? ' или папку' : ''}</div></div>`;
      return;
    }
    content.innerHTML = list.map(item => {
      const icon = item.type === 'note' ? '📝' : (item.depth ? '📁' : '🗂️');
      const cls = item.type === 'note' ? '' : (item.depth ? 'subfolder' : 'folder');
      const sub = item.type === 'note'
        ? (item.last || 'Нет сообщений')
        : `${db.items.filter(x => (x.parentId || null) === item.id).length} внутри`;
      return `
        <div class="listItem" data-open="${item.id}">
          <div class="avatar ${cls}">${icon}</div>
          <div class="itemMain">
            <div class="itemTop">
              <div class="itemName">${escapeHtml(item.name)}</div>
              <div class="itemTime">${timeShort(item.updatedAt)}</div>
            </div>
            <div class="itemSub">${escapeHtml(sub)}</div>
          </div>
          <div class="itemActions">
            <button class="smallBtn danger" data-del="${item.id}">×</button>
          </div>
        </div>`;
    }).join('');

    content.querySelectorAll('[data-open]').forEach(el => {
      el.addEventListener('click', e => {
        if(e.target.dataset.del) return;
        const item = db.items.find(x => x.id === el.dataset.open);
        route = { type:item.type, id:item.id };
        render();
      });
    });
    content.querySelectorAll('[data-del]').forEach(btn => {
      btn.addEventListener('click', e => {
        e.stopPropagation();
        deleteItem(btn.dataset.del);
      });
    });
  }

  function renderMessages(){
    const content = $('content');
    const msgs = db.messages[route.id] || [];
    if(!msgs.length){
      content.innerHTML = `<div class="messages" style="min-height:100%"><div class="dayLabel">${dateLabel()}</div><div class="empty"><div class="emptyIcon">✍️</div><div>Здесь будут сообщения заметки</div></div></div>`;
      return;
    }
    content.innerHTML = `<div class="messages" id="messagesBox"><div class="dayLabel">${dateLabel()}</div>${msgs.map(renderMsg).join('')}</div>`;
    setTimeout(()=> content.scrollTop = content.scrollHeight, 0);
  }

  function renderMsg(m){
    if(m.kind === 'text'){
      return `<div class="bubble">${escapeHtml(m.text)}<span class="meta">${timeShort(m.createdAt)}</span></div>`;
    }
    if(m.kind === 'image'){
      return `<div class="bubble file"><img src="${m.data}" alt=""><div>${escapeHtml(m.name || 'Фото')}</div><span class="meta">${timeShort(m.createdAt)}</span></div>`;
    }
    if(m.kind === 'video' || m.kind === 'circle'){
      const cls = m.kind === 'circle' ? 'style="border-radius:50%;aspect-ratio:1/1;object-fit:cover;max-width:240px"' : '';
      return `<div class="bubble file"><video ${cls} src="${m.data}" controls playsinline></video><div>${escapeHtml(m.name || (m.kind === 'circle' ? 'Кружок' : 'Видео'))}</div><span class="meta">${timeShort(m.createdAt)}</span></div>`;
    }
    if(m.kind === 'audio'){
      return `<div class="bubble file"><audio src="${m.data}" controls></audio><span class="meta">${timeShort(m.createdAt)}</span></div>`;
    }
    return `<div class="bubble file"><div class="fileBox"><div class="fileIcon">📎</div><div style="min-width:0"><div class="fileName">${escapeHtml(m.name || 'Файл')}</div><div class="fileSize">${formatSize(m.size || 0)}</div></div></div><span class="meta">${timeShort(m.createdAt)}</span></div>`;
  }

  function openCreate(){
    $('modalBg').style.display = 'flex';
    $('nameInput').value = '';
    $('nameInput').focus();
    const row = $('choiceRow');
    const folderAllowed = canCreateFolder();
    createType = 'note';
    row.innerHTML = `
      <button class="modalBtn primary" data-type="note">📝 Заметка</button>
      ${folderAllowed ? '<button class="modalBtn" data-type="folder">📁 Папка</button>' : ''}
    `;
    row.querySelectorAll('[data-type]').forEach(b => b.onclick = () => {
      createType = b.dataset.type;
      row.querySelectorAll('.modalBtn').forEach(x=>x.classList.remove('primary'));
      b.classList.add('primary');
    });
  }

  function createItem(){
    const name = $('nameInput').value.trim();
    if(!name) return;
    const parentId = currentParentId();
    const item = {
      id: uid(),
      type: createType,
      name,
      parentId,
      depth: createType === 'folder' ? getDepth(parentId) : getDepth(parentId),
      createdAt: now(),
      updatedAt: now(),
      last: ''
    };
    if(createType === 'note') db.messages[item.id] = [];
    db.items.push(item);
    touchParents(parentId);
    save();
    $('modalBg').style.display = 'none';
    route = { type:item.type, id:item.id };
    render();
  }

  function addMessage(msg){
    if(route.type !== 'note') return;
    db.messages[route.id] ||= [];
    const finalMsg = { id:uid(), createdAt:now(), ...msg };
    db.messages[route.id].push(finalMsg);
    const note = currentItem();
    if(note){
      note.updatedAt = now();
      note.last = preview(finalMsg);
      touchParents(note.parentId);
    }
    save();
    renderMessages();
  }

  function preview(m){
    if(m.kind === 'text') return m.text.slice(0,80);
    if(m.kind === 'image') return 'Фото';
    if(m.kind === 'video') return 'Видео';
    if(m.kind === 'circle') return 'Кружок';
    if(m.kind === 'audio') return 'Аудио';
    return m.name || 'Файл';
  }

  function touchParents(parentId){
    while(parentId){
      const p = db.items.find(x => x.id === parentId);
      if(!p) break;
      p.updatedAt = now();
      parentId = p.parentId;
    }
  }

  function deleteItem(id){
    if(!confirm('Удалить?')) return;
    const all = collectIds(id);
    db.items = db.items.filter(x => !all.includes(x.id));
    all.forEach(x => delete db.messages[x]);
    save();
    render();
  }
  function collectIds(id){
    const out = [id];
    db.items.filter(x => x.parentId === id).forEach(ch => out.push(...collectIds(ch.id)));
    return out;
  }

  async function fileToData(file){
    return new Promise((res, rej) => {
      const r = new FileReader();
      r.onload = () => res(r.result);
      r.onerror = rej;
      r.readAsDataURL(file);
    });
  }
  async function handleFile(input, kind){
    const file = input.files[0];
    input.value = '';
    if(!file) return;
    const data = await fileToData(file);
    addMessage({kind, data, name:file.name, size:file.size});
  }

  function formatSize(bytes){
    if(!bytes) return '';
    if(bytes < 1024) return bytes + ' Б';
    if(bytes < 1024*1024) return Math.round(bytes/1024) + ' КБ';
    return (bytes/1024/1024).toFixed(1) + ' МБ';
  }
  function escapeHtml(str=''){
    return String(str).replace(/[&<>"']/g, s => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'}[s]));
  }

  $('fab').onclick = openCreate;
  $('cancelBtn').onclick = () => $('modalBg').style.display = 'none';
  $('createBtn').onclick = createItem;
  $('nameInput').addEventListener('keydown', e => { if(e.key === 'Enter') createItem(); });
  $('searchInput').addEventListener('input', render);
  $('homeBtn').onclick = () => { route = {type:'root',id:null}; render(); };
  $('backBtn').onclick = () => {
    if(route.type === 'note' || route.type === 'folder'){
      const item = currentItem();
      const parent = parentOf(item);
      route = parent ? {type:'folder', id:parent} : {type:'root', id:null};
      render();
    }
  };

  $('sendBtn').onclick = () => {
    const text = $('msgInput').value.trim();
    if(!text) return;
    $('msgInput').value = '';
    addMessage({kind:'text', text});
  };
  $('msgInput').addEventListener('input', e => {
    e.target.style.height = '42px';
    e.target.style.height = Math.min(e.target.scrollHeight, 120) + 'px';
  });
  $('msgInput').addEventListener('keydown', e => {
    if(e.key === 'Enter' && !e.shiftKey){
      e.preventDefault();
      $('sendBtn').click();
    }
  });

  $('attachBtn').onclick = () => {
    const sh = $('attachSheet');
    sh.style.display = sh.style.display === 'block' ? 'none' : 'block';
  };
  $('attachSheet').addEventListener('click', e => {
    const btn = e.target.closest('[data-action]');
    if(!btn) return;
    $('attachSheet').style.display = 'none';
    const a = btn.dataset.action;
    if(a === 'photo') $('photoInput').click();
    if(a === 'cameraPhoto') $('cameraPhotoInput').click();
    if(a === 'video') $('videoInput').click();
    if(a === 'cameraVideo') $('cameraVideoInput').click();
    if(a === 'circle') $('cameraVideoInput').click(), $('cameraVideoInput').dataset.kind = 'circle';
    if(a === 'file') $('fileInput').click();
    if(a === 'audio') startAudio();
  });

  $('photoInput').onchange = () => handleFile($('photoInput'),'image');
  $('cameraPhotoInput').onchange = () => handleFile($('cameraPhotoInput'),'image');
  $('videoInput').onchange = () => handleFile($('videoInput'),'video');
  $('cameraVideoInput').onchange = () => {
    const kind = $('cameraVideoInput').dataset.kind || 'video';
    $('cameraVideoInput').dataset.kind = '';
    handleFile($('cameraVideoInput'), kind);
  };
  $('fileInput').onchange = () => handleFile($('fileInput'),'file');

  async function startAudio(){
    if(!navigator.mediaDevices?.getUserMedia){
      alert('Запись аудио не поддерживается в этом браузере');
      return;
    }
    try{
      const stream = await navigator.mediaDevices.getUserMedia({audio:true});
      audioChunks = [];
      mediaRecorder = new MediaRecorder(stream);
      mediaRecorder.ondataavailable = e => audioChunks.push(e.data);
      mediaRecorder.onstop = async () => {
        stream.getTracks().forEach(t=>t.stop());
        const blob = new Blob(audioChunks, {type:'audio/webm'});
        const data = await blobToData(blob);
        addMessage({kind:'audio', data, name:'audio.webm', size:blob.size});
        $('recordingBox').style.display = 'none';
      };
      mediaRecorder.start();
      $('recordingBox').style.display = 'block';
    }catch(e){
      alert('Не удалось получить доступ к микрофону');
    }
  }
  function blobToData(blob){
    return new Promise(res => {
      const r = new FileReader();
      r.onload = () => res(r.result);
      r.readAsDataURL(blob);
    });
  }
  $('recStop').onclick = () => {
    if(mediaRecorder && mediaRecorder.state !== 'inactive') mediaRecorder.stop();
  };

  render();
})();
</script>
</body>
</html>
